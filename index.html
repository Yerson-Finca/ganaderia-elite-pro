<!DOCTYPE html>
<html lang="es-CO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Gestión ganadera profesional">
    <title>GANADERO ÉLITE PRO</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./assets/icons/icon-192x192.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ==================== DISEÑO MODERNO ==================== */
        :root {
            /* Paleta Moderna "Deep Slate" con Acento Dorado */
            --bg-gradient: radial-gradient(circle at top right, #1e293b, #0f172a 60%, #020617);
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7); /* Glassmorphism */
            --card-border: rgba(255, 255, 255, 0.08);
            --accent: #fbbf24; /* Dorado más vibrante */
            --accent-soft: rgba(251, 191, 36, 0.1);
            --accent-border: rgba(251, 191, 36, 0.4);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --radius: 24px; /* Más redondeado */
            --radius-sm: 16px;
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.3);
            --font-main: 'Inter', system-ui, sans-serif;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; outline:none; }
        html, body { overflow-x:hidden; max-width:100vw; }
        
        body { 
            font-family: var(--font-main); 
            background: var(--bg);
            background: var(--bg-gradient);
            color:var(--text); 
            min-height:100vh; 
            padding:16px 16px 110px; 
            font-size:14px; 
            display:flex; 
            justify-content:center; 
            font-weight:400; 
            line-height:1.5; 
            -webkit-font-smoothing: antialiased;
        }

        /* Fondo animado suave */
        .aurora { 
            position:fixed; top:0; left:0; width:100%; height:100%; 
            background: 
                radial-gradient(circle at 15% 15%, rgba(251, 191, 36, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(16, 185, 129, 0.05) 0%, transparent 40%); 
            z-index:-1; 
            pointer-events: none;
        }

        .app { width:100%; max-width:500px; position:relative; display:flex; flex-direction:column; gap:16px; }
        
        /* Loader Moderno */
        .loading-screen { position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px; transition: opacity 0.4s ease; }
        .loading-screen.hidden { opacity:0; pointer-events:none; }
        .loader-icon { width:64px; height:64px; background: linear-gradient(135deg, var(--accent), #f59e0b); border-radius: 16px; display:flex; align-items:center; justify-content:center; font-size: 2rem; color: #fff; box-shadow: 0 0 20px rgba(251, 191, 36, 0.4); animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-10px); } }
        @keyframes fadeInApp { from{opacity:0;transform:scale(0.98)} to{opacity:1;transform:scale(1)} }
        .page { animation:fadeInApp .4s ease; }

        /* Header Flotante */
        header { 
            display:flex; justify-content:space-between; align-items:center; 
            padding:12px 16px; margin: -4px -8px 12px -8px; 
            background: rgba(30, 41, 59, 0.5); 
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--card-border);
        }
        header h1 { 
            font-weight:800; font-size:1.2rem; letter-spacing:-.02em; 
            background: linear-gradient(135deg, #fbbf24, #fde68a);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            display:flex; align-items:center; gap:10px;
        }
        .crown-svg { width:22px; height:22px; fill:var(--accent); flex-shrink:0; }
        .header-actions { display:flex; align-items:center; gap:12px; }
        .header-actions .config-btn { 
            width:36px; height:36px; border-radius:12px; 
            background:rgba(255,255,255,.05); 
            border: none; color:var(--text-muted); 
            display:flex; align-items:center; justify-content:center; cursor:pointer; transition:.2s; 
        }
        .header-actions .config-btn:active { transform:scale(0.95); background:rgba(255,255,255,.1); color:#fff; }

        /* Cards Modernas */
        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border); 
            border-radius: var(--radius); 
            padding: 20px; 
            box-shadow: var(--shadow-card); 
            margin-bottom: 16px; 
        }

        /* Botones Modernos */
        .btn { 
            width:100%; padding:14px 16px; 
            border-radius: 16px; 
            border: none;
            font-size: 0.9rem; font-weight: 600; 
            display:flex; align-items:center; justify-content:center; gap:8px; 
            transition: transform 0.1s; 
            margin-bottom: 8px; cursor:pointer; 
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.15), rgba(251, 191, 36, 0.05));
            color: var(--accent); 
            border: 1px solid var(--accent-border);
        }
        .btn:active { transform:scale(0.97); }
        .btn-green { background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(16, 185, 129, 0.05)); color: #34d399; border-color: rgba(16, 185, 129, 0.3); }
        .btn-gray { background: rgba(255,255,255,.04); color: var(--text-muted); border: 1px solid var(--card-border); }
        .btn-danger { background: rgba(239,68,68,.1); color: #f87171; border: 1px solid rgba(239,68,68,.2); }
        .btn-sm { width:auto; padding: 8px 12px; font-size: 0.75rem; border-radius: 12px; min-height: 32px; }

        /* Inputs Modernos */
        input[type=number],input[type=text],input[type=date],select { 
            width:100%; padding:12px 16px; 
            border-radius: 14px; 
            border: 1px solid var(--card-border); 
            background: rgba(0, 0, 0, 0.2); 
            color:var(--text); font-family:inherit; font-size:14px; font-weight:500; outline:none; transition:.2s; 
        }
        input:focus,select:focus { border-color: var(--accent-border); background: rgba(0, 0, 0, 0.4); }

        /* Tipografía y Elementos */
        .row-label { color:var(--text-muted); font-size:.75rem; font-weight:500; display:flex; align-items:center; gap:8px; }
        .row-label i { font-size:1rem; width:20px; text-align:center; color: var(--accent); }
        .row-val { font-weight:700; font-size:.9rem; color: var(--text); }
        
        /* Stats Grid */
        .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; }
        .stat-item { background:rgba(0,0,0,0.25); padding:14px; border-radius: 18px; border: 1px solid var(--card-border); }
        
        /* Navegación Flotante */
        .bottom-nav { 
            position:fixed; bottom:24px; left:50%; transform:translateX(-50%); 
            width:92%; max-width:400px; height:64px; 
            display:flex; justify-content:space-around; align-items:center; 
            z-index:500; 
            background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border); 
            border-radius: 24px; 
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4); 
            padding: 0 8px;
        }
        .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; color:var(--text-muted); font-size:.6rem; cursor:pointer; transition:.2s; font-weight:600; text-transform:uppercase; letter-spacing:.04em; }
        .nav-item i { font-size:1.15rem; margin-bottom:0px; transition:.15s; }
        .nav-item.active { color:var(--accent); }
        .nav-item.active i { transform:translateY(-2px) scale(1.1); }
        
        /* Botón Central Flotante */
        .nav-center { 
            width:56px; height:56px; border-radius:18px; 
            background: linear-gradient(135deg, #fbbf24, #d97706); 
            color:#000; font-size:1.5rem; 
            display:flex; align-items:center; justify-content:center; 
            box-shadow: 0 8px 24px rgba(251, 191, 36, 0.4); 
            cursor:pointer; border:none; transition:transform .15s; margin-top:-32px; 
        }
        .nav-center:active { transform:scale(0.9) rotate(90deg); }

        /* Lista de Insumos Moderna */
        .insumo-item { 
            background: rgba(255,255,255,.02); 
            border:1px solid var(--card-border); 
            border-radius: 20px; 
            padding:16px; margin-bottom:12px; 
        }
        .insumo-item-header { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
        .insumo-item-header i { font-size:1.2rem; color:var(--accent); width:30px; text-align:center; }
        .info .name { font-weight:600; font-size:.9rem; color: #fff; }
        
        /* Modal Glassmorphic */
        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.75); backdrop-filter: blur(5px); z-index:200; display:flex; align-items:flex-end; justify-content:center; }
        .modal { 
            background: #1e293b; 
            border: 1px solid var(--card-border);
            border-radius: 24px 24px 0 0; 
            padding: 24px; width:100%; max-width: 500px; max-height: 85vh; overflow-y:auto; 
            box-shadow: 0 -10px 40px rgba(0,0,0,.5); 
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

        /* Utilidades */
        .hidden { display:none!important; } .flex-col { display:flex; flex-direction:column; } .gap8 { gap:8px; } .mt6 { margin-top:6px; } .mt12 { margin-top:12px; }
        .custom-badge { background:var(--accent); color:#000; font-size:.6rem; padding:2px 6px; border-radius:6px; font-weight:700; }
        
        /* Gráfico */
        .chart-box { background: rgba(0,0,0,0.2); border-radius: 16px; padding: 12px; margin-top: 8px; }
        
        /* Animaciones de entrada */
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .fade-in { animation: fadeIn 0.4s ease; }
    </style>
</head>
<body>
<div class="aurora"></div><div id="toastContainer"></div><div id="modalContainer"></div>

<!-- LOADER -->
<div id="loadingScreen" class="loading-screen">
    <div class="loader-icon"><i class="fa-solid fa-cow"></i></div>
    <div style="text-align:center">
        <div style="font-weight:800; font-size:1.2rem; color:#fff; margin-bottom:4px;">CARGANDO...</div>
        <div style="font-size:0.8rem; color:var(--text-muted);">GANADERO ÉLITE PRO</div>
    </div>
</div>

<div class="app" id="appContainer">
    <header id="mainHeader">
        <h1><svg class="crown-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M2.5 18.5l1.5-12 5.5 4 2.5-6 2.5 6 5.5-4 1.5 12h-19z"/></svg>GANADERO ÉLITE</h1>
        <div class="header-actions">
            <span id="saveIndicator" class="save-indicator" style="font-size:.6rem; color:var(--success); opacity:0;"><i class="fa-solid fa-check"></i> Guardado</span>
            <div class="config-btn" onclick="goPage('alertas')"><i class="fa-solid fa-bell"></i></div>
            <div class="config-btn" onclick="goPage('config')"><i class="fa-solid fa-gear"></i></div>
        </div>
    </header>
    
    <div id="v-inicio" class="page"></div><div id="v-lotes" class="hidden page"></div><div id="v-animales" class="hidden page"></div><div id="v-insumos" class="hidden page"></div><div id="v-alertas" class="hidden page"></div><div id="v-config" class="hidden page"></div><div id="v-perfil" class="hidden page"></div>
</div>

<nav class="bottom-nav">
    <div class="nav-item" data-p="insumos"><i class="fa-solid fa-boxes-stacked"></i><span>Insumos</span></div>
    <div class="nav-item" data-p="lotes"><i class="fa-solid fa-layer-group"></i><span>Lotes</span></div>
    <button class="nav-center" onclick="showAddAnimalModal()"><i class="fa-solid fa-plus"></i></button>
    <div class="nav-item" data-p="animales"><i class="fa-solid fa-cow"></i><span>Animales</span></div>
    <div class="nav-item active" data-p="inicio"><i class="fa-solid fa-house"></i><span>Inicio</span></div>
</nav>

<script>
// ==================== LÓGICA COMPLETA (SIN CAMBIOS) ====================
const APP_VERSION = '5.0.0';
const STORAGE_KEY = 'ganadero_elite_v' + APP_VERSION.replace('.','_');
let DB = { animales: [], lotes: [], config: {}, inventario: {}, sanidad: {}, aplicaciones: [], asignacionesAlimentos: {} };
let lastSaveTime = null, autoSaveTimer = null, saveTimeout = null, insumoTab = 'alimentos', searchTimeout = null;

const DEFAULT_INSUMOS = ['pasto', 'salvado', 'melaza', 'levadura', 'bicarb', 'sal', 'urea'];
const DEFAULT_DATOS_INSUMOS = {
    pasto: { nombre: 'Pasto Picado', icono: 'fa-seedling', unidad: 'kg' },
    salvado: { nombre: 'Salvado Trigo', icono: 'fa-wheat-awn', unidad: 'kg' },
    melaza: { nombre: 'Melaza', icono: 'fa-droplet', unidad: 'kg' },
    levadura: { nombre: 'Levadura', icono: 'fa-flask', unidad: 'g' },
    bicarb: { nombre: 'Bicarbonato', icono: 'fa-cubes', unidad: 'g' },
    sal: { nombre: 'Sal Mineral', icono: 'fa-vial-circle-check', unidad: 'g' },
    urea: { nombre: 'UREA', icono: 'fa-flask-vial', unidad: 'g' }
};

const DATOS_POR_DEFECTO = {
    animales: [],
    lotes: [{ id: 'lot_general', nombre: 'General', color: '#ffb900' }],
    config: {
        precios: { pasto: 80, salvado: 900, melaza: 1400, levadura: 9000, bicarb: 2500, sal: 3000, urea: 4000 },
        stock: { pasto: 500, salvado: 200, melaza: 50, levadura: 10, bicarb: 5, sal: 2, urea: 20 },
        stockSanidad: {}, preciosSanidad: {}, sanidadCatalogo: [],
        precioKG: 9800, precioLeche: 1200, valorCria: 450000, intervaloPartos: 400, costosFijosMensuales: 300000,
        factoresDesperdicio: { pasto: 0.15, salvado: 0.08, melaza: 0.05, levadura: 0.02, bicarb: 0.03, sal: 0.03, urea: 0.02 },
        unidadesPrecio: { pasto: 'kg', salvado: 'kg', melaza: 'kg', levadura: 'kg', bicarb: 'kg', sal: 'kg', urea: 'kg' },
        insumosActivos: [...DEFAULT_INSUMOS]
    },
    inventario: {}, sanidad: {}, aplicaciones: [], asignacionesAlimentos: {}
};

function iniciarApp() {
    try {
        const datos = localStorage.getItem(STORAGE_KEY);
        if (datos) {
            DB = { ...DATOS_POR_DEFECTO, ...JSON.parse(datos) };
            DB.config = { ...DATOS_POR_DEFECTO.config, ...(DB.config || {}) };
            // Reparación automática de inventarios
            if(!DB.inventario) DB.inventario = {};
            Object.keys(DEFAULT_DATOS_INSUMOS).forEach(k => { if(!DB.inventario[k]) DB.inventario[k] = { ...DEFAULT_DATOS_INSUMOS[k], stock: 0, precioUnitario: 0 }; });
            if(!DB.config.insumosActivos) DB.config.insumosActivos = [...DEFAULT_INSUMOS];
            if(!DB.config.sanidadCatalogo) DB.config.sanidadCatalogo = [];
        } else {
            DB = JSON.parse(JSON.stringify(DATOS_POR_DEFECTO));
            Object.keys(DEFAULT_DATOS_INSUMOS).forEach(k => { DB.inventario[k] = { ...DEFAULT_DATOS_INSUMOS[k], stock: 0, precioUnitario: DB.config.precios[k]||0 }; });
        }

        // Migración vieja
        const oldData = localStorage.getItem('ganadero_elite_v4_5_0');
        if (oldData && (!datos || !DB.animales.length)) {
            try {
                const parsed = JSON.parse(oldData);
                if(parsed.animales) {
                    DB.animales = parsed.animales;
                    if(parsed.lotes) DB.lotes = parsed.lotes;
                }
            } catch(e){}
        }

        guardarDatos(); goPage('inicio');
    } catch (e) { console.error("Error crítico:", e); alert("Error al cargar datos. Reiniciando..."); localStorage.clear(); location.reload(); }
}
document.addEventListener('DOMContentLoaded', iniciarApp);
if (document.readyState !== 'loading') iniciarApp();

function getCfg(k) { return DB.config?.[k]; }
function setCfg(k, v) { if(!DB.config) DB.config={}; DB.config[k] = v; guardarDatos(); }
const fm = (n) => { if(isNaN(n)||n===null||n===undefined) return '0'; n=Math.round(n); return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); };
const showToast = (m, d = 3000) => { const t = document.createElement('div'); t.className = 'toast'; t.innerHTML = m; document.getElementById('toastContainer').appendChild(t); setTimeout(() => t.remove(), d); };
const showModal = (h) => { const o = document.createElement('div'); o.className = 'modal-overlay'; o.innerHTML = '<div class="modal">' + h + '</div>'; o.onclick = (e) => { if (e.target === o) o.remove(); }; document.getElementById('modalContainer').appendChild(o); };
const getDiasDesde = (f) => { if (!f) return 999; var p = f.split('/'); if (p.length < 3) return 999; return Math.floor((new Date() - new Date(p[2], p[1] - 1, p[0])) / 864e5); };
const randColor = () => ['#fbbf24', '#10b981', '#3b82f6', '#ef4444', '#a78bfa', '#f59e0b'][Math.floor(Math.random() * 6)];
const formatTimeAgo = (ts) => { if (!ts) return 'Nunca'; const diff = Math.floor((Date.now() - ts) / 1000); return diff<60?'hace '+diff+'s':diff<3600?'hace '+Math.floor(diff/60)+'min':'hace '+Math.floor(diff/3600)+'h'; };
const guardarDatos = () => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(DB)); if(window.saveIndicatorTimeout) clearTimeout(window.saveIndicatorTimeout); const el=document.getElementById('saveIndicator'); if(el){el.style.opacity=1; window.saveIndicatorTimeout=setTimeout(()=>el.style.opacity=0, 1500);} return true; } catch(e){ return false; } };

const getInsumosActivos = () => DB.config?.insumosActivos || [];
const getInsumoData = (id) => DB.inventario[id] || {};
const TRIGGERS = { ureaMinWeight: 150, pregnancyUreaBlockDay: 210, maxRumenVolumePct: 0.12 };
const CONSUMO_MS_PV = 0.03;
const FACTOR_MS_DEFAULT = { pasto: 0.20, salvado: 0.88, melaza: 0.75 };
const getFactorMS = (id) => FACTOR_MS_DEFAULT[id] || 1.0;

// Motor de Dieta
const getDiet = (pv, prop, estado, transicionDias = 0, diasGestacion = 0, incluirFD = false) => {
    if (pv < 20) return { _meta: { ureaBloqueada: false, motivo: null } };
    const dieta = { _meta: { ureaBloqueada: false, motivo: null } };
    const msTotalRequerida = pv * CONSUMO_MS_PV;
    const baseSuplemento = msTotalRequerida * 0.06;
    const insumos = getInsumosActivos();
    const esTernera = pv < 150;
    const ureaPermitida = !(pv < TRIGGERS.ureaMinWeight || diasGestacion >= TRIGGERS.pregnancyUreaBlockDay);
    let parts = {};
    if(insumos.includes('pasto')) parts['pasto'] = 0.50;
    if(insumos.includes('salvado')) parts['salvado'] = 0.30;
    if(insumos.includes('melaza')) parts['melaza'] = 0.20;
    const activosCount = insumos.length;
    if(activosCount > 0 && Object.keys(parts).length === 0) {
        const share = 1 / activosCount;
        insumos.forEach(id => parts[id] = share);
    }
    insumos.forEach(id => {
        const part = parts[id] || (1/activosCount);
        const ms = baseSuplemento * part;
        const factor = getFactorMS(id);
        let val = ms / factor;
        if(id === 'pasto' && val > pv * TRIGGERS.maxRumenVolumePct) val = pv * TRIGGERS.maxRumenVolumePct;
        if(id === 'urea') { if(!ureaPermitida) { val = 0; dieta._meta.ureaBloqueada = true; } else val = Math.min(val, msTotalRequerida * 0.11 * 1000); }
        const data = getInsumoData(id);
        if(data.dosisPorKg && !FACTOR_MS_DEFAULT[id]) val = pv * data.dosisPorKg;
        dieta[id] = val;
    });
    if (transicionDias > 0 && transicionDias < 7) {
        const f = transicionDias / 7;
        Object.keys(dieta).forEach(k => { if (k !== '_meta') dieta[k] *= f; });
    }
    if (incluirFD) {
        const fd = getCfg('factoresDesperdicio') || {};
        Object.keys(dieta).forEach(k => { if (k !== '_meta') dieta[k] *= (1 + (fd[k] || 0.05)); });
    }
    return dieta;
};

const getCostoDiario = (pv, prop, estado) => {
    const d = getDiet(pv, prop, estado, 0, 0, false);
    let total = 0;
    Object.keys(d).forEach(k => {
        if(k === '_meta') return;
        const cant = d[k];
        const precio = (getCfg('precios')?.[k]) || (DB.inventario[k]?.precioUnitario) || 0;
        const uCompra = getCfg('unidadesPrecio')?.[k] || DB.inventario[k]?.unidad || 'kg';
        const unidadInsumo = DB.inventario[k]?.unidad || 'kg';
        if (unidadInsumo === 'g' && uCompra === 'kg') total += (cant / 1000) * precio;
        else if (unidadInsumo === 'kg' && uCompra === 'g') total += (cant * 1000) * precio;
        else total += cant * precio;
    });
    return total;
};

const getGMD = (h) => { if (h.length < 2) return 0; const f = h[0], l = h[h.length - 1]; const pF = f.fecha.split('/'), pL = l.fecha.split('/'); const d1 = new Date(parseInt(pF[2]), parseInt(pF[1]) - 1, parseInt(pF[0])), d2 = new Date(parseInt(pL[2]), parseInt(pL[1]) - 1, parseInt(pL[0])); const diffDias = (d2 - d1) / 864e5; return diffDias < 1 ? 0 : Math.max(0, Math.min((l.peso - f.peso) / diffDias, 2.5)); };
const getRendimiento = (h, gmdForzado = null) => { if (h.length < 2) return { nivel: 'azul', texto: 'Registre más', cm: 0, color: 'azul' }; const g = gmdForzado || getGMD(h), r = g > 0 ? g / 0.8 : 0, c = ((g - 0.8) / 0.8) * 100; return r >= 1.2 ? { nivel: 'verde', texto: 'Excelente', cm: c, color: '#10b981' } : r >= 0.9 ? { nivel: 'azul', texto: 'Bueno', cm: c, color: '#3b82f6' } : r >= 0.7 ? { nivel: 'naranja', texto: 'Regular', cm: c, color: '#f59e0b' } : { nivel: 'rojo', texto: 'Bajo', cm: c, color: '#ef4444' }; };

const renderGraficoEvolucion = (historial) => {

    const minP = Math.min(...datos.map(d => d.peso)) * 0.95, maxP = Math.max(...datos.map(d => d.peso)) * 1.05, w = 320, h = 130, pad = { t: 15, r: 15, b: 25, l: 38 }, cw = w - pad.l - pad.r, ch = h - pad.t - pad.b;
    const pts = datos.map((d, i) => ({ x: pad.l + (i / (datos.length - 1)) * cw, y: pad.t + ch - ((d.peso - minP) / (maxP - minP)) * ch, peso: d.peso, fecha: d.fechaStr }));
    const pathD = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x},${p.y}`).join(' ');

    const p = a.historial[a.historial.length - 1].peso, rep = calcRepro(a), et = getEtapa(p, rep);
    const r = getRendimiento(a.historial, getGMD(a.historial)), gmd = getGMD(a.historial);
    const valA = p * (getCfg('precioKG') || 9800); let etxt = '--'; if (a.fechaNacimiento) { const n = new Date(a.fechaNacimiento), h = new Date(), d = Math.ceil(Math.abs(h - n) / 864e5); etxt = d > 60 ? `${Math.floor(d / 30)}m` : `${d}d`; }
    const gv = gmd > 0 ? gmd : 0;
    const cd = getCostoDiario(p, a.proposito, rep?.estadoLactancia || 'auto');
    const csd = getCostoSanidadDiario(id);
    const costoDiarioTotal = cd + csd;
    const ingresoDiario = calcularIngresoDiario(a, gv, getCfg('precioKG') || 9800);
    const mgDiario = ingresoDiario - costoDiarioTotal;
    const roia = calcularROIA(gv, getCfg('precioKG') || 9800, costoDiarioTotal);
    const ckp = gv > 0 ? costoDiarioTotal / gv : null;
    const mama = a.madreId ? (DB.animales.find(x => x.id == a.madreId)?.nombre || '--') : '--';
    const fotoStyle = a.foto ? `background-image:url('${a.foto}')` : '';
    const gmdColor = gmd > 0.3 ? 'var(--success)' : gmd > 0 ? 'var(--warning)' : 'var(--danger)';
    const mgColor = mgDiario >= 0 ? 'var(--success)' : 'var(--danger)';
    const mgSign = mgDiario >= 0 ? '+' : '-';
    const proy30 = gv > 0 ? p + (gv * 30) : p; const proy60 = gv > 0 ? p + (gv * 60) : p; const proy120 = gv > 0 ? p + (gv * 120) : p;
    
    let html = `<div class="sp-container">
        <div class="sp-header" style="padding:12px 16px;">
            <button class="sp-back" onclick="closeProfile()"><i class="fa-solid fa-arrow-left"></i></button>
            <div style="flex:1; text-align:center; font-weight:800; font-size:1.1rem;">${a.nombre || 'Animal'}</div>
            <button class="sp-back" onclick="shareAnimal(${id})"><i class="fa-solid fa-share-nodes"></i></button>
        </div>
        <div class="sp-hero">
            <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="handlePhotoUpload(this.files[0], ${id})">
            <div class="sp-avatar-large" style="${fotoStyle}" onclick="document.getElementById('photoInput').click()">${!a.foto ? '<span>🐄</span>' : ''}</div>
            <div style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:12px;">
                <div class="chip" style="background:${et.color}20; color:${et.color}; border-color:${et.color}40">${et.nombre}</div>
                <div class="chip" style="background:rgba(255,255,255,.1)">${getLoteName(a.loteId)}</div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:12px;">
                <div class="stat-item"><span style="display:block;font-size:1.2rem;font-weight:800;">${fm(p)} kg</span><span style="font-size:.6rem;color:var(--text-muted)">PESO</span></div>
                <div class="stat-item"><span style="display:block;font-size:1.2rem;font-weight:800;color:${gmdColor}">${gmd!==0?gmd.toFixed(2):'--'}</span><span style="font-size:.6rem;color:var(--text-muted)">GMD</span></div>
                <div class="stat-item"><span style="display:block;font-size:1.2rem;font-weight:800;color:var(--accent)">$${fm(valA)}</span><span style="font-size:.6rem;color:var(--text-muted)">VALOR</span></div>
            </div>
            <div style="font-size:.75rem;color:var(--text-muted);margin-top:12px;">Edad: <b>${etxt}</b> · Mama: <b>${mama}</b></div>
        </div>
        <div class="sp-content">
            <div class="card">${renderGraficoEvolucion(a.historial)}</div>
            <div class="card">
                <div style="font-weight:700;margin-bottom:12px;">RENTABILIDAD</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                    <div class="stat-item"><div class="row-label">Margen Diario</div><div style="font-size:1.1rem;font-weight:800;color:${mgColor}">${mgSign}$${fm(Math.abs(mgDiario))}</div></div>
                    <div class="stat-item"><div class="row-label">ROIA</div><div style="font-size:1.1rem;font-weight:800;color:var(--accent)">${roia.toFixed(2)}x</div></div>
                </div>
            </div>
            <div class="card">
                <div style="font-weight:700;margin-bottom:12px;">PROYECCIONES</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; text-align:center;">
                    <div class="stat-item"><div style="font-size:1rem;font-weight:700">${fm(proy30)}</div><div style="font-size:.6rem;color:var(--text-muted)">30d</div></div>
                    <div class="stat-item"><div style="font-size:1rem;font-weight:700">${fm(proy60)}</div><div style="font-size:.6rem;color:var(--text-muted)">60d</div></div>
                    <div class="stat-item"><div style="font-size:1rem;font-weight:700;color:var(--accent)">${gv > 0 ? Math.ceil((500 - p) / gv) + 'd' : '--'}</div><div style="font-size:.6rem;color:var(--text-muted)">Meta 500</div></div>
                </div>
            </div>
            <div class="card">
                <div style="font-weight:700;margin-bottom:12px;">DIETA</div>
                <div class="row"><span class="row-label"><i class="fa-solid fa-receipt"></i> Costo Diario</span><span class="row-val" style="color:var(--warning)">$ ${fm(costoDiarioTotal)}</span></div>
                ${getInsumosActivos().map(k => { const d = getDiet(p, a.proposito, rep?.estadoLactancia || 'auto', a.transicionDias || 0, rep?.diasGestacion || 0); const data = getInsumoData(k); const v = d[k], u = data.unidad || 'kg'; const dp = u === 'kg' ? v.toFixed(1) : Math.round(v); const isLocked = (k==='urea' && (pv < TRIGGERS.ureaMinWeight || (rep && rep.diasGestacion >= TRIGGERS.pregnancyUreaBlockDay))); if(k==='urea' && isLocked) return `<div class="row" style="opacity:0.5;text-decoration:line-through"><span class="row-label"><i class="fa-solid ${data.icono || 'fa-flask-vial'}"></i> ${data.nombre||k}</span><span class="row-val">0</span></div>`; return `<div class="row"><span class="row-label"><i class="fa-solid ${data.icono || 'fa-leaf'}"></i> ${data.nombre||k}</span><span class="row-val">${dp}${u}</span></div>`; }).join('')}
            </div>
        </div>
        <div style="position:sticky; bottom:0; background:var(--bg); padding:16px; border-top:1px solid var(--card-border); display:flex; gap:12px;">
            <button class="btn btn-gold" onclick="updateWeight(${id})" style="flex:1"><i class="fa-solid fa-scale-balanced"></i> Pesaje</button>
        </div>
    </div>`;
    document.querySelectorAll('.page').forEach(el => el.classList.add('hidden'));
    document.getElementById('v-perfil').classList.remove('hidden');
    document.getElementById('v-perfil').innerHTML = html;
    document.querySelector('header').classList.add('hidden');
    requestWakeLock();
}

function showAddAnimalModal() { let opts = DB.lotes.map(l => `<option value="${l.id}">${l.nombre || 'Sin nombre'}</option>`).join(''), moms = '<option value="">-- Sin Madre --</option>'; if(DB.animales) DB.animales.forEach(a => { if (a.proposito === 'leche') moms += `<option value="${a.id}">${a.nombre}</option>`; }); showModal(`<div style="font-weight:700;margin-bottom:16px;color:var(--accent); font-size:1.1rem;"><i class="fa-solid fa-cow"></i> NUEVO ANIMAL</div><div class="flex-col gap10"><input id="addN" type="text" placeholder="Nombre"><input id="addW" type="number" placeholder="Peso (kg)" min="20" max="2000"><select id="addLote">${opts}</select><div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"><select id="addProp"><option value="carne">🥩 CARNE</option><option value="leche">🥛 LECHE</option></select><select id="addOrig"><option value="nacimiento">🐄 Nacimiento</option><option value="comprado">💰 Comprado</option></select></div><div class="flex-col gap6"><div class="row-label">Fecha Nacimiento</div><input id="addFechaNac" type="date"><div class="row-label">Madre</div><select id="addMama">${moms}</select></div><button class="btn btn-gold mt12" onclick="guardarNuevoAnimal()"><i class="fa-solid fa-check"></i> REGISTRAR</button><button class="btn btn-gray" onclick="document.querySelector('.modal-overlay').remove()">CANCELAR</button></div>`); }
function guardarNuevoAnimal() { const n = document.getElementById('addN').value.trim(), w = parseFloat(document.getElementById('addW').value), lote = document.getElementById('addLote').value, p = document.getElementById('addProp').value, orig = document.getElementById('addOrig').value, fn = document.getElementById('addFechaNac')?.value, mi = document.getElementById('addMama')?.value, pr = 0; if (!n || isNaN(w) || w < 20 || w > 2000) return showToast('⚠️ Verifica datos'); const fh = new Date().toLocaleDateString(), fr = (orig === 'nacimiento' && fn) ? fn.split('-').reverse().join('/') : fh; const newAnimal = { id: Date.now(), nombre: n, historial: [{ fecha: fr, peso: w }], proposito: p, origen: orig, valorCompra: pr, fechaUltimoParto: null, estadoReproductivo: 'novilla', loteId: lote, fechaNacimiento: fn || null, madreId: mi || null, tags: [], litrosLeche: 0, transicionDias: 0, transicionActiva: false, bloqueadoPorRetiro: false, diasGestacion: 0, fechaUltimaInseminacion: null }; DB.animales.push(newAnimal); guardarDatos(); document.querySelector('.modal-overlay').remove(); showToast(`✅ ${n} registrado`); goPage('animales'); }
function showAddLoteModal() { showModal(`<div style="font-weight:700;margin-bottom:16px;color:var(--accent)">➕ NUEVO LOTE</div><div class="flex-col gap10"><input id="nlNombre" type="text" placeholder="Nombre"><input id="nlColor" type="color" value="${randColor()}" style="width:100%;height:40px;"><button class="btn btn-gold mt8" onclick="guardarLote()"><i class="fa-solid fa-check"></i> CREAR</button><button class="btn btn-gray" onclick="document.querySelector('.modal-overlay').remove()">CANCELAR</button></div>`); }
function guardarLote() { const n = document.getElementById('nlNombre').value.trim(), c = document.getElementById('nlColor').value; if (!n) return showToast('⚠️ Ingresa nombre'); const l = { id: 'lot_' + Date.now(), nombre: n, color: c }; DB.lotes.push(l); guardarDatos(); document.querySelector('.modal-overlay').remove(); showToast(`✅ Lote "${n}" creado`); renderLotes(); }
function showEditLoteColor(lid) { const l = DB.lotes.find(x => x.id === lid); if (!l) return; showModal(`<div style="font-weight:700;margin-bottom:12px;color:var(--accent)">✏️ COLOR</div><div class="flex-col gap10"><input id="elColor" type="color" value="${l.color}" style="width:100%;height:40px"><button class="btn btn-green mt8" onclick="guardarColorLote('${lid}')"><i class="fa-solid fa-check"></i> GUARDAR</button><button class="btn btn-gray" onclick="document.querySelector('.modal-overlay').remove()">CANCELAR</button></div>`); }
function guardarColorLote(lid) { const l = DB.lotes.find(x => x.id === lid); if (l) { l.color = document.getElementById('elColor').value; guardarDatos(); } document.querySelector('.modal-overlay').remove(); renderLotes(); showToast('✅ Color actualizado'); }
function deleteLote(lid) { if (lid === 'lot_general') return showToast('⚠️ No eliminar General'); if (!confirm('¿Eliminar? Animales a General')) return; DB.animales.forEach(a => { if (a.loteId === lid) a.loteId = 'lot_general'; }); DB.lotes = DB.lotes.filter(l => l.id !== lid); guardarDatos(); renderLotes(); showToast('✅ Lote eliminado'); }
function updateWeight(id) { const a = DB.animales.find(x => x.id === id); if (!a) return; const ow = a.historial[a.historial.length - 1].peso; const p = prompt(`⚖️ Nuevo peso:\nActual: ${ow}kg`,''); if (!p) return; const peso = parseFloat(p); if (isNaN(peso) || peso < 20 || peso > 2000) return showToast('⚠️ Inválido'); if (peso < ow && !confirm('⚠️ Peso menor. ¿Continuar?')) return; const fechaInput = prompt(`📅 Fecha:`, new Date().toLocaleDateString()); const fechaFinal = fechaInput ? fechaInput : new Date().toLocaleDateString(); const partes = fechaFinal.split('/'); if (partes.length !== 3) { showToast('⚠️ Formato inválido (DD/MM/AAAA)'); return; } a.historial.push({ fecha: fechaFinal, peso: peso }); guardarDatos(); showProfile(id); }
function closeProfile() { releaseWakeLock(); document.getElementById('v-perfil').classList.add('hidden'); document.querySelector('header').classList.remove('hidden'); goPage('animales'); }

function showModalGestionSanidad() { showModal(`<div style="font-weight:700;margin-bottom:16px;color:var(--accent)">➕ NUEVA SANIDAD</div><div class="flex-col gap10"><input id="scNombre" type="text" placeholder="Nombre"><input id="scDosis" type="number" step="0.01" placeholder="Dosis (ml/kg)"><input id="scEfecto" type="number" placeholder="Días efecto"><input id="scRetiro" type="number" placeholder="Días retiro"><button class="btn btn-green mt8" onclick="guardarSanidadCustom()"><i class="fa-solid fa-check"></i> GUARDAR</button><button class="btn btn-gray" onclick="document.querySelector('.modal-overlay').remove()">CANCELAR</button></div>`); }
function guardarSanidadCustom() { const n = document.getElementById('scNombre').value.trim(), d = parseFloat(document.getElementById('scDosis').value), ef = parseInt(document.getElementById('scEfecto').value) || 0, ret = parseInt(document.getElementById('scRetiro').value) || 0; if (!n || isNaN(d)) return showToast('⚠️ Completa'); const id = 'sc_' + Date.now(); const item = { id, nombre: n, dosis: d, diasEfecto: ef, retiro: ret, icono: 'fa-syringe', color: '#a78bfa', esBase: false, stockML: 0, precioML: 0 }; DB.sanidad[id] = item; guardarDatos(); document.querySelector('.modal-overlay').remove(); showToast('✅ Agregado'); renderInsumos(); }
function deleteSanidadCustom(id) { if (!confirm('¿Eliminar?')) return; delete DB.sanidad[id]; guardarDatos(); renderInsumos(); }

if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(() => {}); }); }
