<script>
// ==================== SISTEMA DE BASE DE DATOS HÍBRIDO ====================
const DB_NAME = 'GanaderoEliteDB';
const DB_VERSION = 1;
let dbInstance = null;
let isIndexedDB = true;

const DB = {
    open: () => {
        return new Promise((resolve, reject) => {
            if(!window.indexedDB) {
                isIndexedDB = false;
                console.log('IndexedDB no soportado, usando localStorage');
                return resolve(null);
            }
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onerror = () => { isIndexedDB = false; resolve(null); };
            request.onsuccess = () => { dbInstance = request.result; resolve(dbInstance); };
            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains('animales')) db.createObjectStore('animales', { keyPath: 'id' });
                if (!db.objectStoreNames.contains('lotes')) db.createObjectStore('lotes', { keyPath: 'id' });
                if (!db.objectStoreNames.contains('config')) db.createObjectStore('config', { keyPath: 'key' });
                if (!db.objectStoreNames.contains('inventario')) db.createObjectStore('inventario', { keyPath: 'id' });
                if (!db.objectStoreNames.contains('sanidad')) db.createObjectStore('sanidad', { keyPath: 'id' });
            };
        });
    },
    getAll: (storeName) => {
        if(!isIndexedDB) return Promise.resolve([]);
        return new Promise((resolve, reject) => {
            try {
                const tx = dbInstance.transaction(storeName, 'readonly');
                const store = tx.objectStore(storeName);                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => resolve([]);
            } catch(e) { resolve([]); }
        });
    },
    put: (storeName, data) => {
        if(!isIndexedDB) return Promise.resolve();
        return new Promise((resolve, reject) => {
            try {
                const tx = dbInstance.transaction(storeName, 'readwrite');
                const store = tx.objectStore(storeName);
                store.put(data).onsuccess = () => resolve();
            } catch(e) { resolve(); }
        });
    },
    clear: (storeName) => {
        if(!isIndexedDB) return Promise.resolve();
        return new Promise((resolve) => {
            try {
                dbInstance.transaction(storeName, 'readwrite').objectStore(storeName).clear().onsuccess = () => resolve();
            } catch(e) { resolve(); }
        });
    }
};

let DB_CACHE = {
    animales: [], lotes: [],
    config: {}, inventario: {}, sanidad: {}, aplicaciones: [], asignacionesAlimentos: {}
};

async function migrateFromLocalStorage() {
    if(localStorage.getItem('db_migrated_v4.6')) return;
    const oldData = localStorage.getItem('ganadero_elite_v4_5_0');
    if (oldData && isIndexedDB) {
        try {
            const parsed = JSON.parse(oldData);
            if (parsed.animales) {
                for (const a of parsed.animales) await DB.put('animales', a);
                if(parsed.lotes) for(const l of parsed.lotes) await DB.put('lotes', l);
                const configKeys = ['precios','stock','preciosSanidad','stockSanidad','precioKG','precioLeche','valorCria','intervaloPartos','costosFijosMensuales','factoresDesperdicio','unidadesPrecio'];
                for(const k of configKeys) if(parsed[k] !== undefined) await DB.put('config', { key: k, value: parsed[k] });
                if(parsed.alimentosCustom) for(const i of parsed.alimentosCustom) await DB.put('inventario', i);
                if(parsed.sanidadCustom) for(const s of parsed.sanidadCustom) await DB.put('sanidad', s);
                localStorage.setItem('db_migrated_v4.6', 'true');
                showToast('✅ Datos actualizados a nueva versión');
            }
        } catch (e) { console.error('Migración fallida', e); }
    }
}
async function loadAllData() {
    await DB.open();
    await migrateFromLocalStorage();
    
    if(isIndexedDB) {
        DB_CACHE.animales = await DB.getAll('animales');
        DB_CACHE.lotes = await DB.getAll('lotes');
        const configs = await DB.getAll('config');
        configs.forEach(c => DB_CACHE.config[c.key] = c.value);
        const inv = await DB.getAll('inventario'); inv.forEach(i => DB_CACHE.inventario[i.id] = i);
        const san = await DB.getAll('sanidad'); san.forEach(s => DB_CACHE.sanidad[s.id] = s);
    } else {
        const old = localStorage.getItem('ganadero_elite_v4_5_0');
        if(old) {
            const d = JSON.parse(old);
            DB_CACHE.animales = d.animales || [];
            DB_CACHE.lotes = d.lotes || [];
            DB_CACHE.config = { precios: d.precios, stock: d.stock, precioKG: d.precioKG };
        }
    }

    if(DB_CACHE.animales.length === 0 && DB_CACHE.lotes.length === 0) {
        DB_CACHE.lotes = [{id:'lot_general',nombre:'General',color:'#ffb900'}];
        if(isIndexedDB) await DB.put('lotes', DB_CACHE.lotes[0]);
    }
    if(!DB_CACHE.config.precios) DB_CACHE.config.precios = { pasto:80, salvado:900, melaza:1400, levadura:9000, bicarb:2500, sal:3000, urea:4000 };
    if(!DB_CACHE.config.stock) DB_CACHE.config.stock = { pasto:500, salvado:200, melaza:50, levadura:10, bicarb:5, sal:2, urea:20 };
    if(!DB_CACHE.config.precioKG) DB_CACHE.config.precioKG = 9800;
    if(!DB_CACHE.config.factoresDesperdicio) DB_CACHE.config.factoresDesperdicio = { pasto:0.15, salvado:0.08, melaza:0.05, levadura:0.02, bicarb:0.03, sal:0.03, urea:0.02 };
    if(!DB_CACHE.config.unidadesPrecio) DB_CACHE.config.unidadesPrecio = { pasto:'kg', salvado:'kg', melaza:'kg', levadura:'kg', bicarb:'kg', sal:'kg', urea:'kg' };

    const app = document.getElementById('appContainer');
    const loader = document.getElementById('loadingScreen');
    app.style.display = 'flex';
    loader.classList.add('fade-out');
    setTimeout(() => loader.style.display = 'none', 500);
    
    verificarNotificaciones();
    goPage('inicio');
}

async function saveToDB() {
    showSaveIndicator();
    try {
        if(isIndexedDB) {
            await Promise.all([
                ...DB_CACHE.animales.map(a => DB.put('animales', a)),
                ...DB_CACHE.lotes.map(l => DB.put('lotes', l)),
                Object.keys(DB_CACHE.config).map(k => DB.put('config', {key:k, value:DB_CACHE.config[k]})),                Object.values(DB_CACHE.inventario).map(i => DB.put('inventario', i)),
                Object.values(DB_CACHE.sanidad).map(s => DB.put('sanidad', s))
            ]);
        }
        localStorage.setItem('ganadero_backup_cache', JSON.stringify(DB_CACHE));
        return true;
    } catch(e) { console.error(e); return false; }
}

// ==================== LÓGICA DE NEGOCIO ====================
const APP_VERSION = '4.6.2';
let lastSaveTime = null, autoSaveTimer = null, saveTimeout = null, insumoTab = 'alimentos', searchTimeout = null;
const fm = (n) => { if(isNaN(n)||n===null||n===undefined) return '0'; n=Math.round(n); var s=String(n); var r=''; var c=0; for(var i=s.length-1;i>=0;i--){if(c>0&&c%3===0) r='.'+r; r=s.charAt(i)+r; c++;} return r; };
const showToast = (m, d=3000) => { const t=document.createElement('div'); t.className='toast'; t.innerHTML=m; document.getElementById('toastContainer').appendChild(t); setTimeout(()=>t.remove(),d); };
const showModal = (h) => { const o=document.createElement('div'); o.className='modal-overlay'; o.innerHTML='<div class="modal">'+h+'</div>'; o.onclick=(e)=>{if(e.target===o)o.remove();}; document.getElementById('modalContainer').appendChild(o); };
const getDiasDesde = (f) => { if(!f) return 999; var p=f.split('/'); if(p.length<3) return 999; return Math.floor((new Date()-new Date(p[2],p[1]-1,p[0]))/864e5); };
const randColor = () => ['#ffb900','#22c55e','#3b82f6','#ef4444','#a78bfa','#f59e0b','#ec4899','#14b8a6'][Math.floor(Math.random()*8)];
const formatTimeAgo = (ts) => { if(!ts) return 'Nunca'; const diff=Math.floor((Date.now()-ts)/1000); if(diff<60) return 'hace '+diff+'s'; if(diff<3600) return 'hace '+Math.floor(diff/60)+'min'; if(diff<86400) return 'hace '+Math.floor(diff/3600)+'h'; return 'hace '+Math.floor(diff/86400)+'d'; };
const showSaveIndicator = () => { const el=document.getElementById('saveIndicator'); if(el){clearTimeout(saveTimeout); el.classList.add('visible'); saveTimeout=setTimeout(()=>el.classList.remove('visible'),2000);} };

const save = async () => { const success = await saveToDB(); if(success) { lastSaveTime = Date.now(); } };
const queueAutoSave = () => { clearTimeout(autoSaveTimer); autoSaveTimer=setTimeout(save, 800); };

const AL = ['pasto','salvado','melaza','levadura','bicarb','sal','urea'];
const IC = { pasto:'fa-seedling', salvado:'fa-wheat-awn', melaza:'fa-droplet', levadura:'fa-flask', bicarb:'fa-cubes', sal:'fa-vial-circle-check', urea:'fa-flask-vial' };
const NM = { pasto:'Pasto Picado', salvado:'Salvado Trigo', melaza:'Melaza', levadura:'Levadura', bicarb:'Bicarbonato', sal:'Sal Mineral', urea:'UREA' };
const UNIDAD = { pasto:'kg', salvado:'kg', melaza:'kg', levadura:'g', bicarb:'g', sal:'g', urea:'g' };
const FACTOR_MS = { pasto:0.20, salvado:0.88, melaza:0.75, levadura:1, bicarb:1, sal:1, urea:1 };
const CONSUMO_MS_PV = 0.03;
const MICRO_FORMULAS = { sal:{type:'pv',factor:0.5}, bicarb:{type:'ms',factor:10}, levadura:{type:'pv',factor:0.05}, urea:{type:'ms',factor:11,maxPct:0.11} };
const TRIGGERS = { ureaMinWeight:150, pregnancyUreaBlockDay:210, maxRumenVolumePct:0.12 };

const CATALOGO_SANIDAD = [
    {id:'modificador',nombre:'Modificador Orgánico',dosis:50,diasEfecto:90,retiro:0,icono:'fa-flask',color:'#22c55e'},
    {id:'vitaminaA',nombre:'Vitamina ADE',dosis:50,diasEfecto:60,retiro:30,icono:'fa-sun',color:'#ffb900'},
    {id:'complejoB',nombre:'Complejo B (B12)',dosis:50,diasEfecto:20,retiro:0,icono:'fa-capsules',color:'#3b82f6'},
    {id:'ivermectina1',nombre:'Ivermectina 1%',dosis:50,diasEfecto:30,retiro:28,icono:'fa-shield-virus',color:'#ef4444'},
    {id:'ivermectina315',nombre:'Ivermectina 3.15%',dosis:50,diasEfecto:90,retiro:122,icono:'fa-shield-halved',color:'#dc2626'},
    {id:'fosforo',nombre:'Fósforo B12',dosis:20,diasEfecto:30,retiro:0,icono:'fa-bone',color:'#a78bfa'},
    {id:'hierro',nombre:'Hierro Dextrano',dosis:100,diasEfecto:30,retiro:0,icono:'fa-droplet',color:'#f87171'}
];

const getCfg = (k) => DB_CACHE.config[k];
const setCfg = (k, v) => { DB_CACHE.config[k] = v; };

const getDiet = (pv, prop, estado, transicionDias=0, diasGestacion=0, incluirFD=false) => { 
    if(pv<20) return {pasto:0,salvado:0,melaza:0,urea:0,bicarb:0,sal:0,levadura:0,_meta:{ureaBloqueada:false,motivo:null}};
    const msTotalRequerida = pv * CONSUMO_MS_PV;
    const esTernera = pv<150, p=prop||'carne', st=estado||'auto';
    const ureaPermitida = !(pv < TRIGGERS.ureaMinWeight || diasGestacion >= TRIGGERS.pregnancyUreaBlockDay);    const calcMicro = (f,pv,ms) => f.type==='pv'?pv*f.factor:ms*f.factor;
    let msPasto=msTotalRequerida*0.90, msSalvado=msTotalRequerida*0.10, msMelaza=0;
    if(p==='carne'){if(esTernera)msMelaza=msTotalRequerida*0.02;else if(st==='venta')msMelaza=msTotalRequerida*0.05;else msMelaza=msTotalRequerida*0.03;}
    else if(p==='leche'){if(st==='parida')msMelaza=msTotalRequerida*0.03;else if(st==='seca')msMelaza=msTotalRequerida*0.01;else msMelaza=msTotalRequerida*0.01;}
    const toFresco = (ms,fMS,u) => u==='kg'?ms/fMS:(ms/fMS)*1000;
    let pastoFresco = toFresco(msPasto,FACTOR_MS.pasto,'kg');
    if(pastoFresco > pv*TRIGGERS.maxRumenVolumePct) pastoFresco = pv*TRIGGERS.maxRumenVolumePct;
    let dieta = {
        pasto:pastoFresco, salvado:toFresco(msSalvado,FACTOR_MS.salvado,'kg'), melaza:toFresco(msMelaza,FACTOR_MS.melaza,'kg'),
        levadura:calcMicro(MICRO_FORMULAS.levadura,pv,msTotalRequerida), bicarb:calcMicro(MICRO_FORMULAS.bicarb,pv,msTotalRequerida),
        sal:calcMicro(MICRO_FORMULAS.sal,pv,msTotalRequerida),
        urea:ureaPermitida?Math.min(calcMicro(MICRO_FORMULAS.urea,pv,msTotalRequerida),msTotalRequerida*0.11*1000):0,
        _meta:{ureaBloqueada:!ureaPermitida, motivo:pv<TRIGGERS.ureaMinWeight?'Peso<150kg':'Gestación>210d'}
    };
    if(transicionDias>0 && transicionDias<7){
        const f=transicionDias/7, dAnt={pasto:(pv*0.03*0.95)/FACTOR_MS.pasto,salvado:(pv*0.03*0.05)/FACTOR_MS.salvado,melaza:(pv*0.03*0.01)/FACTOR_MS.melaza,urea:0,bicarb:(pv*0.03*0.10)*1000,sal:(pv*0.03*0.15)*1000,levadura:(pv*0.05/1000)*1000};
        Object.keys(dieta).forEach(k=>{if(k!=='_meta')dieta[k]=dAnt[k]+((dieta[k]-dAnt[k])*f);});
    }
    if(incluirFD){const fd=getCfg('factoresDesperdicio')||{}; Object.keys(dieta).forEach(k=>{if(k!=='_meta'&&fd[k])dieta[k]*=(1+fd[k]);});}
    return dieta;
};

const getCostoDiario = (pv, prop, estado) => { 
    const d = getDiet(pv, prop, estado, 0, 0, false); const pr = getCfg('precios') || {}; const unidades = getCfg('unidadesPrecio') || {};
    return Object.keys(d).filter(k=>k!=='_meta').reduce((s,k)=>{
        const cant=d[k], precio=pr[k]||0, uCompra=unidades[k]||'kg'; let factor=1; if(UNIDAD[k]==='g'&&uCompra==='kg') factor=0.001; return s+(cant*precio*factor);
    },0);
};

const getCostoDiarioConFD = (pv, prop, estado) => { 
    const d = getDiet(pv, prop, estado, 0, 0, true); const pr = getCfg('precios') || {}; const unidades = getCfg('unidadesPrecio') || {}; const fd = getCfg('factoresDesperdicio') || {};
    return Object.keys(d).filter(k=>k!=='_meta').reduce((s,k)=>{
        const cant=d[k], precio=pr[k]||0, uCompra=unidades[k]||'kg'; const cantConFD=cant*(1+(fd[k]||0)); let factor=1; if(UNIDAD[k]==='g'&&uCompra==='kg') factor=0.001; return s+(cantConFD*precio*factor);
    },0);
};

const getGMD = (h) => { 
    if(h.length<2) return 0; const f=h[0], l=h[h.length-1]; const pF=f.fecha.split('/'), pL=l.fecha.split('/');
    const fecha1=new Date(parseInt(pF[2]),parseInt(pF[1])-1,parseInt(pF[0])), fecha2=new Date(parseInt(pL[2]),parseInt(pL[1])-1,parseInt(pL[0]));
    const diffDias=(fecha2-fecha1)/864e5; if(diffDias<1) return 0; const gmd=(l.peso-f.peso)/diffDias; return Math.max(0,Math.min(gmd,2.5));
};

const getRendimiento = (h, gmdForzado=null) => { 
    if(h.length<2) return {nivel:'azul',texto:'Registre más',cm:0,color:'azul'}; 
    const g=gmdForzado||getGMD(h), r=g>0?g/0.8:0, c=((g-0.8)/0.8)*100;
    return r>=1.2?{nivel:'verde',texto:'Excelente',cm:c,color:'#22c55e'}:r>=0.9?{nivel:'azul',texto:'Bueno',cm:c,color:'#3b82f6'}:r>=0.7?{nivel:'naranja',texto:'Regular',cm:c,color:'#f59e0b'}:{nivel:'rojo',texto:'Bajo',cm:c,color:'#ef4444'};
};

const calcRepro = (a) => {
    if(a.proposito!=='leche' && !a.fechaUltimoParto) return null;    if(!a.fechaUltimoParto) return {diasPP:0,diasParaParto:999,fechaProxParto:null,semaforo:{color:'#6b7280',txt:'📅 Sin registro',tipo:'gris'},estadoLactancia:'novilla',avisoSecado:false,diasGestacion:a.diasGestacion||0};
    const hoy=new Date(), parto=new Date(a.fechaUltimoParto.split('/').reverse().join('-')), diasPP=Math.max(0,Math.floor((hoy-parto)/864e5));
    const fpp=new Date(parto); fpp.setDate(parto.getDate()+285); const dpp=Math.floor((fpp-hoy)/864e5);
    let dg=a.diasGestacion||0; if(a.fechaUltimaInseminacion){const ins=new Date(a.fechaUltimaInseminacion.split('/').reverse().join('-')); dg=Math.max(0,Math.floor((hoy-ins)/864e5));}
    let sem, est=a.estadoReproductivo||'parida';
    if(dpp<=60&&dpp>0){sem={color:'#3b82f6',txt:'🔵 Secado ('+dpp+'d)',tipo:'secado'};est='seca';}else if(diasPP<=60)sem={color:'#22c55e',txt:'🟢 Recuperación',tipo:'verde'};else if(diasPP<=150)sem={color:'#f59e0b',txt:'🟡 Ventana Monta',tipo:'amarillo'};else sem={color:'#ef4444',txt:'🔴 ALERTA Vacía',tipo:'rojo'};
    return {diasPP,diasParaParto:dpp,fechaProxParto:fpp.toLocaleDateString('es-CO'),semaforo:sem,estadoLactancia:est,avisoSecado:dpp<=60&&dpp>0,diasGestacion:dg};
};

const getEtapa = (pv,rep) => { var e=rep?rep.estadoLactancia:'auto'; if(e==='seca')return{nombre:'Vaca Seca',clase:'etapa-madurez',icono:'🥛',min:300,max:600,ureaBloqueada:false,color:'#3b82f6',siguiente:'Venta'}; if(e==='parida')return{nombre:'Producción',clase:'etapa-ceba',icono:'🐄',min:400,max:800,ureaBloqueada:false,color:'#22c55e',siguiente:'Venta'}; if(pv<150)return{nombre:'Cría',clase:'etapa-inicio',icono:'🐮',min:0,max:150,ureaBloqueada:true,color:'#ffb900',siguiente:'Levante'}; if(pv<350)return{nombre:'Levante',clase:'etapa-desarrollo',icono:'🐂',min:150,max:350,ureaBloqueada:false,color:'#60a5fa',siguiente:'Ceba'}; return{nombre:'Ceba',clase:'etapa-madurez',icono:'🐃',min:350,max:500,ureaBloqueada:false,color:'#fb923c',siguiente:'Venta'}; };
const getProgresoEtapa = (pv,e) => Math.min(100,Math.max(0,((pv-e.min)/(e.max-e.min))*100));
const getCostoAlimentosCustom = (aid,p) => { if(!DB_CACHE.asignacionesAlimentos||!DB_CACHE.asignacionesAlimentos[aid])return 0; return DB_CACHE.asignacionesAlimentos[aid].reduce((s,a)=>{if(!a.activo)return s;const i=DB_CACHE.inventario[a.alimentoId]; return i?s+(p*(i.unidad==='g'?i.dosisPorKg*0.001:i.dosisPorKg)*i.precioUnitario):s;},0); };
const getAllSanidad = () => [...CATALOGO_SANIDAD.map(p=>({...p,esBase:true})),...Object.values(DB_CACHE.sanidad).map(p=>({...p,esBase:false}))];
const getCostoSanidadDiario = (aid) => { let t=0; const apps = DB_CACHE.aplicaciones ? DB_CACHE.aplicaciones.filter(x=>x.animalId===aid) : []; apps.forEach(ap=>{const p=getAllSanidad().find(x=>x.id===ap.productoId);if(p&&p.diasEfecto>0)t+=(ap.costo||0)/p.diasEfecto;});return t; };

const generarFlujoCajaMensual = (meses=6) => {
    const cf=[]; let saldo=0; const cfM=getCfg('costosFijosMensuales')||300000; const precioBase=getCfg('precioKG')||9800; const estacionalidad=[1.0,1.0,1.0,1.05,1.05,1.1]; let breakEven=null, maxNeg=0;
    DB_CACHE.animales.forEach(a => {
        let p=a.historial[a.historial.length-1].peso; const gmdReal=getGMD(a.historial);
        for(let m=0; m<meses; m++){
            const pMes=gmdReal>0?p+(gmdReal*30):p; let venta=0;
            if(a.proposito==='carne'&&p>=480&&gmdReal>0&&(m>0||p>=490)){venta=p*(precioBase*estacionalidad[m%6])*0.95; p=0;} else if(p>0&&gmdReal>0) p=pMes;
            const cd=getCostoDiarioConFD(p,a.proposito,calcRepro(a)?.estadoLactancia||'auto'), ingDia=calcularIngresoDiario(a,gmdReal,precioBase);
            const ingTotal=venta+(ingDia*30), costoVar=cd*30+getCostoSanidadDiario(a.id)*30, neto=ingTotal-costoVar-(a===DB_CACHE.animales[0]?cfM:0);
            saldo+=neto; if(!cf[m]) cf[m]={mes:m+1,ingresos:0,costosVar:0,fijos:0,neto:0,saldo:0};
            cf[m].ingresos+=ingTotal; cf[m].costosVar+=costoVar; cf[m].fijos+=(a===DB_CACHE.animales[0]?cfM:0); cf[m].neto+=neto; cf[m].saldo=saldo;
            if(saldo>0&&!breakEven) breakEven=m+1; if(saldo<maxNeg) maxNeg=saldo;
        }
    });
    return {flujo:cf, saldoFinal:saldo, breakEven:breakEven||(saldo<0?'No alcanza':'N/A'), roi:saldo>0?(saldo/Math.abs(maxNeg||1)*100).toFixed(1):'N/A'};
};

// ✅ GRÁFICO SVG
const renderGraficoEvolucion = (historial) => {
    if(historial.length<2) return '<div style="text-align:center;color:var(--text-muted);padding:12px;font-size:.75rem;background:rgba(255,255,255,.03);border-radius:10px;margin-top:8px">Se necesitan ≥2 pesajes</div>';
    const datos=historial.map(h=>{const p=h.fecha.split('/'); return {fecha:new Date(p[2],p[1]-1,p[0]),peso:h.peso,fechaStr:h.fecha};}).sort((a,b)=>a.fecha-b.fecha);
    const minP=Math.min(...datos.map(d=>d.peso))*0.95, maxP=Math.max(...datos.map(d=>d.peso))*1.05, w=320, h=130, pad={t:15,r:15,b:25,l:38}, cw=w-pad.l-pad.r, ch=h-pad.t-pad.b;
    const pts=datos.map((d,i)=>({x:pad.l+(i/(datos.length-1))*cw, y:pad.t+ch-((d.peso-minP)/(maxP-minP))*ch, peso:d.peso, fecha:d.fechaStr}));
    const pathD=pts.map((p,i)=>`${i===0?'M':'L'}${p.x},${p.y}`).join(' ');
    const circles=pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="var(--accent)" stroke="#0a0a0c" stroke-width="2"/>`).join('');
    const dates=pts.map((p,i)=>i%Math.ceil(pts.length/3)===0?`<text x="${p.x}" y="${h-4}" fill="var(--text-muted)" font-size="9" text-anchor="middle">${p.fecha}</text>`:'').join('');
    const gridY=[minP,(minP+maxP)/2,maxP].map(v=>{const y=pad.t+ch-((v-minP)/(maxP-minP))*ch; return `<line x1="${pad.l}" y1="${y}" x2="${w-pad.r}" y2="${y}" stroke="rgba(255,255,255,.05)" stroke-dasharray="3,3"/><text x="${pad.l-5}" y="${y+3}" fill="var(--text-muted)" font-size="9" text-anchor="end">${Math.round(v)}</text>`;}).join('');
    return `<div class="chart-box"><svg viewBox="0 0 ${w} ${h}" style="display:block">${gridY}<path d="${pathD}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>${circles}${dates}</svg></div>`;
};

// ✅ FUNCIÓN MEJORADA PARA SUBIR FOTOS (GALERÍA + CÁMARA + VALIDACIÓN)
async function handlePhotoUpload(file, animalId) {
    if(!file) return;
    if(!file.type.startsWith('image/')) return showToast('⚠️ Solo imágenes');
    if(file.size > 5 * 1024 * 1024) return showToast('⚠️ Máximo 5MB');
    
    const img = new Image();    img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX = 800; let w = img.width, h = img.height;
        if(w > h) { if(w > MAX) { h *= MAX/w; w = MAX; } } else { if(h > MAX) { w *= MAX/h; h = MAX; } }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const a = DB_CACHE.animales.find(x => x.id === animalId);
        if(a) { 
            a.foto = canvas.toDataURL('image/jpeg', 0.7); 
            save(); showProfile(animalId); showToast('✅ Foto guardada'); 
        }
    };
    img.onerror = () => showToast('⚠️ Error al cargar');
    img.src = URL.createObjectURL(file);
}

async function clearAllData() {
    if(isIndexedDB) {
        await DB.clear('animales'); await DB.clear('lotes'); await DB.clear('config'); await DB.clear('inventario'); await DB.clear('sanidad');
    }

async function initCacheFromJSON(d) {
    DB_CACHE.animales = d.animales || [];
    DB_CACHE.lotes = d.lotes || [];
    DB_CACHE.config = {
        precios: d.precios, stock: d.stock, preciosSanidad: d.preciosSanidad, stockSanidad: d.stockSanidad,
        precioKG: d.precioKG, precioLeche: d.precioLeche, valorCria: d.valorCria, intervaloPartos: d.intervaloPartos,
        costosFijosMensuales: d.costosFijosMensuales, factoresDesperdicio: d.factoresDesperdicio, unidadesPrecio: d.unidadesPrecio
    };
    DB_CACHE.inventario = {}; (d.alimentosCustom||[]).forEach(i => DB_CACHE.inventario[i.id] = i);
    DB_CACHE.sanidad = {}; (d.sanidadCustom||[]).forEach(s => DB_CACHE.sanidad[s.id] = s);
    DB_CACHE.aplicaciones = d.aplicaciones || [];
    DB_CACHE.asignacionesAlimentos = d.asignacionesAlimentos || {};
    
    if(isIndexedDB) {        await Promise.all([
            ...DB_CACHE.animales.map(a => DB.put('animales', a)),
            ...DB_CACHE.lotes.map(l => DB.put('lotes', l)),
            Object.keys(DB_CACHE.config).map(k => DB.put('config', {key:k, value:DB_CACHE.config[k]})),
            Object.values(DB_CACHE.inventario).map(i => DB.put('inventario', i)),
            Object.values(DB_CACHE.sanidad).map(s => DB.put('sanidad', s))
        ]);
    }
}

// ✅ FUNCIÓN AUXILIAR PARA COLORES DE MÉTRICAS
const getColorMetrica = (valor, umbralBajo=0, umbralAlto=null) => {
    if(valor < umbralBajo) return 'var(--danger)';
    if(umbralAlto && valor >= umbralAlto) return 'var(--success)';
    if(valor > umbralBajo) return 'var(--warning)';
    return 'var(--text-muted)';
};

            </div>

            <div class="sp-card">
                <div class="sp-card-header"><div class="sp-card-title"><i class="fa-solid fa-calendar-week"></i> PROYECCIONES</div></div>

                </div>
                <div class="progress" style="margin-top: 12px;"><div class="progress-fill" style="width: ${Math.min(100, (p / 500) * 100)}%; background: var(--accent);"></div></div>
                <div style="font-size: 0.6rem; text-align: center; color: var(--text-muted);">${fm(p)} / 500 kg (${Math.min(100, (p / 500) * 100).toFixed(0)}%)</div>
            </div>

            <div class="sp-card">
                <div class="sp-card-header"><div class="sp-card-title"><i class="fa-solid fa-wheat-awn"></i> Dieta & Costos</div><button class="btn btn-sm btn-purple" style="width:auto;padding:4px 8px;margin:0;font-size:0.6rem" onclick="showModalAsignarAlimento(${id})">+ Alimento</button></div>
                <div class="row"><span class="row-label"><i class="fa-solid fa-receipt"></i> Costo Diario Total</span><span class="row-val" style="color:var(--warning)">$ ${fm(costoDiarioTotal)}</span></div>
                ${AL.map(k => {
                    const d = getDiet(p, a.proposito, rep?.estadoLactancia || 'auto', a.transicionDias || 0, rep?.diasGestacion || 0);
                    const v = d[k], u = UNIDAD[k];
                    const dp = u === 'kg' ? v.toFixed(1) : Math.round(v);
                    const msNote = (k === 'pasto' || k === 'salvado' || k === 'melaza') ? ` <span style="font-size:.6rem;color:var(--text-muted)">(${(v*FACTOR_MS[k]).toFixed(1)}kg MS)</span>` : '';
                    const fd = d.urea === 0 && a.proposito !== 'leche';
                    if (k === 'urea' && fd) return `<div class="row" style="opacity:0.5;text-decoration:line-through"><span class="row-label"><i class="fa-solid ${IC[k]}"></i> ${NM[k]}</span><span class="row-val">0 (Bloqueado)</span></div>`;
                    return `<div class="row"><span class="row-label"><i class="fa-solid ${IC[k]}"></i> ${NM[k]}</span><span class="row-val">${dp}${u} ${msNote}</span></div>`;
                }).join('')}
            </div>

            ${a.proposito === 'leche' && rep ? `
            <div class="sp-card" style="border-left:4px solid ${rep.semaforo.color}">
                <div class="sp-card-header"><div class="sp-card-title" style="color:${rep.semaforo.color}"><i class="fa-solid fa-heart"></i> Reproductivo</div></div>
                <div style="text-align:center;padding:8px;background:${rep.semaforo.color}15;border-radius:12px;margin-bottom:10px"><div style="font-size:1.1rem;font-weight:700;color:${rep.semaforo.color}">${rep.semaforo.txt}</div></div>
                <div class="row"><span class="row-label"><i class="fa-solid fa-clock"></i> Días Post-Parto</span><span class="row-val">${rep.diasPP}d</span></div>
                <div class="row"><span class="row-label"><i class="fa-solid fa-baby"></i> Próximo parto</span><span class="row-val">${rep.fechaProxParto || '--'}</span></div>                ${rep.avisoSecado ? '<div style="margin-top:8px;background:rgba(59,130,246,.1);color:#60a5fa;padding:8px;border-radius:8px;font-size:.75rem;text-align:center">💧 <b>Dieta Seca:</b> Iniciar en 60 días</div>' : ''}
                <button class="btn btn-sm btn-purple mt8" onclick="showReproModal(${id})"><i class="fa-solid fa-pen"></i> Registrar Evento</button>
            </div>` : ''}

        </div>

        <div class="sp-actions-bar">
            <button class="btn btn-gold" onclick="updateWeight(${id})"><i class="fa-solid fa-scale-balanced"></i> Pesaje</button>
            <button class="btn btn-purple" onclick="openAplicarProducto(${id})"><i class="fa-solid fa-syringe"></i> Sanidad</button>
            <button class="btn btn-green" onclick="showModalAsignarAlimento(${id})"><i class="fa-solid fa-plus"></i> Alimento</button>
        </div>
    </div>`;
    
    document.querySelectorAll('.page').forEach(el=>el.classList.add('hidden'));
    document.getElementById('v-perfil').classList.remove('hidden');
    document.getElementById('v-perfil').innerHTML=html;
    document.querySelector('header').classList.add('hidden');
    requestWakeLock();
}

function confirmDeleteAnimal(id){const a=DB_CACHE.animales.find(x=>x.id===id);showModal(`<div style="text-align:center;padding:10px 0"><i class="fa-solid fa-triangle-exclamation" style="font-size:2.5rem;color:var(--warning);margin-bottom:14px"></i><h3 style="margin-bottom:8px;font-size:1rem">¿Eliminar ${a.nombre}?</h3><p style="color:var(--text-muted);margin-bottom:18px;font-size:.8rem">Se borrará todo el historial.</p><button class="btn btn-danger" onclick="deleteAnimal(${id})"><i class="fa-solid fa-trash-can"></i> SÍ</button><button class="btn btn-gray mt8" onclick="document.querySelector('.modal-overlay').remove()">CANCELAR</button></div>`);}
function closeProfile(){releaseWakeLock(); document.getElementById('v-perfil').classList.add('hidden');document.querySelector('header').classList.remove('hidden');goPage('animales');}
function toggleOrigenFields(){const o=document.getElementById('addOrig')?.value,n=document.getElementById('nacimientoFields'),c=document.getElementById('compradoFields');if(n)n.classList.toggle('hidden',o!=='nacimiento');if(c)c.classList.toggle('hidden',o!=='comprado');}
function showAddAnimalModal(){let opts=DB_CACHE.lotes.map(l=>`<option value="${l.id}">${l.nombre}</option>`).join(''),moms='<option value="">-- Sin Madre --</option>';DB_CACHE.animales.forEach(a=>{if(a.proposito==='leche')moms+=`<option value="${a.id}">${a.nombre}</option>`;});showModal(`<div style="font-weight:700;margin-bottom:14px;color:var(--accent);font-size:1rem"><i class="fa-solid fa-cow"></i> NUEVO ANIMAL</div><div class="flex-col gap10"><input id="addN" type="text" placeholder="Nombre"><input id="addW" type="number" placeholder="Peso (kg)" min="20" max="2000"><select id="addLote">${opts}</select><div class="grid"><select id="addProp"><option value="carne">🥩 CARNE</option><option value="leche">🥛 LECHE</option></select><select id="addOrig" onchange="toggleOrigenFields()"><option value="nacimiento">🐄 Nacimiento</option><option value="comprado">💰 Comprado</option></select></div><div id="nacimientoFields" class="flex-col gap8"><div class="row-label">Fecha Nacimiento</div><input id="addFechaNac" type="date"><div class="row-label">Madre</div><select id="addMama">${moms}</select></div><div id="compradoFields" class="hidden"><input id="addPrice" type="number" placeholder="Valor compra ($)"></div><button class="btn btn-gold mt12" onclick="guardarNuevoAnimal()"><i class="fa-solid fa-check"></i> REGISTRAR</button><button class="btn btn-gray" onclick="document.querySelector('.modal-overlay').remove()">CANCELAR</button></div>`);}
async function guardarNuevoAnimal(){const n=document.getElementById('addN').value.trim(),w=parseFloat(document.getElementById('addW').value),lote=document.getElementById('addLote').value,p=document.getElementById('addProp').value,orig=document.getElementById('addOrig').value,fn=document.getElementById('addFechaNac')?.value,mi=document.getElementById('addMama')?.value,pr=parseFloat(document.getElementById('addPrice')?.value)||0;if(!n||isNaN(w)||w<20||w>2000)return showToast('⚠️ Verifica datos');const fh=new Date().toLocaleDateString(),fr=(orig==='nacimiento'&&fn)?fn.split('-').reverse().join('/'):fh;const newAnimal={id:Date.now(),nombre:n,historial:[{fecha:fr,peso:w}],proposito:p,origen:orig,valorCompra:pr,fechaUltimoParto:null,estadoReproductivo:'novilla',loteId:lote,fechaNacimiento:fn||null,madreId:mi||null,tags:[],litrosLeche:0,transicionDias:0,transicionActiva:false,bloqueadoPorRetiro:false,diasGestacion:0,fechaUltimaInseminacion:null};
DB_CACHE.animales.push(newAnimal);
if(isIndexedDB) await DB.put('animales', newAnimal);
document.querySelector('.modal-overlay').remove();showToast(`✅ ${n} registrado`);goPage('animales');}
function showAddLoteModal(){showModal(`<div style="font-weight:700;margin-bottom:12px;color:var(--accent)"><i class="fa-solid fa-plus"></i> NUEVO LOTE</div><div class="flex-col gap10"><input id="nlNombre" type="text" placeholder="Nombre"><input id="nlColor" type="color" value="${randColor()}" style="width:100%;height:38px"><button class="btn btn-gold mt8" onclick="guardarLote()"><i class="fa-solid fa-check"></i> CREAR</button><button class="btn btn-gray" onclick="document.querySelector('.modal-overlay').remove()">CANCELAR</button></div>`);}
async function guardarLote(){const n=document.getElementById('nlNombre').value.trim(),c=document.getElementById('nlColor').value;if(!n)return showToast('⚠️ Ingresa nombre');const l={id:'lot_'+Date.now(),nombre:n,color:c};DB_CACHE.lotes.push(l);if(isIndexedDB) await DB.put('lotes', l);document.querySelector('.modal-overlay').remove();showToast(`✅ Lote "${n}" creado`);renderLotes();}
function showEditLoteColor(lid){const l=DB_CACHE.lotes.find(x=>x.id===lid);if(!l)return;showModal(`<div style="font-weight:700;margin-bottom:12px;color:var(--accent)"><i class="fa-solid fa-palette"></i> COLOR</div><div class="flex-col gap10"><input id="elColor" type="color" value="${l.color}" style="width:100%;height:44px"><button class="btn btn-green mt8" onclick="guardarColorLote('${lid}')"><i class="fa-solid fa-check"></i> GUARDAR</button><button class="btn btn-gray" onclick="document.querySelector('.modal-overlay').remove()">CANCELAR</button></div>`);}
async function guardarColorLote(lid){const l=DB_CACHE.lotes.find(x=>x.id===lid);if(l){l.color=document.getElementById('elColor').value;if(isIndexedDB) await DB.put('lotes', l);}document.querySelector('.modal-overlay').remove();renderLotes();showToast('✅ Color actualizado');}
async function deleteLote(lid){if(lid==='lot_general')return showToast('⚠️ No eliminar General');if(!confirm('¿Eliminar? Animales a General'))return;DB_CACHE.animales.forEach(a=>{if(a.loteId===lid)a.loteId='lot_general';});DB_CACHE.lotes=DB_CACHE.lotes.filter(l=>l.id!==lid);if(isIndexedDB) await DB.put('lotes', DB_CACHE.lotes); renderLotes();showToast('✅ Lote eliminado');}
async function updateWeight(id){const a=DB_CACHE.animales.find(x=>x.id===id);if(!a)return;const ow=a.historial[a.historial.length-1].peso;const p=prompt(`⚖️ Nuevo peso (kg):\nActual: ${ow}kg`,'');if(!p)return;const peso=parseFloat(p);if(isNaN(peso)||peso<20||peso>2000)return showToast('⚠️ Peso inválido');if(peso<ow&&!confirm('⚠️ Peso menor. ¿Continuar?'))return;const fechaInput=prompt(`📅 Fecha:\nFormato: DD/MM/AAAA`,new Date().toLocaleDateString());const fechaFinal=fechaInput?fechaInput:new Date().toLocaleDateString();const partes=fechaFinal.split('/');if(partes.length!==3){showToast('⚠️ Formato inválido. DD/MM/AAAA');return;}a.historial.push({fecha:fechaFinal,peso:peso});if(isIndexedDB) await DB.put('animales', a); recalcularTodo(id);}
function recalcularTodo(id){const a=DB_CACHE.animales.find(x=>x.id===id);if(!a)return;const p=a.historial[a.historial.length-1].peso,et=getEtapa(p,calcRepro(a));if(a.fechaNacimiento&&p<=150){const ed=Math.floor((new Date()-new Date(a.fechaNacimiento))/864e5);if(ed>=210&&et.nombre==='Cría'){a.estadoReproductivo='destetado';a.transicionActiva=true;a.transicionDias=1;showToast('🍼 Destete auto: Levante');}}save();showProfile(id);}
async function deleteAnimal(id){DB_CACHE.animales=DB_CACHE.animales.filter(x=>x.id!==id);delete DB_CACHE.asignacionesAlimentos[id];if(isIndexedDB) await DB.put('animales', DB_CACHE.animales); document.querySelector('.modal-overlay').remove();closeProfile();showToast('✅ Eliminado');}
function openAplicarProducto(id){const a=DB_CACHE.animales.find(x=>x.id===id);if(!a)return;const p=a.historial[a.historial.length-1].peso;let opts=getAllSanidad().map(pr=>`<option value="${pr.id}">${pr.nombre} (${pr.diasEfecto}d)</option>`).join('');showModal(`<div style="font-weight:700;margin-bottom:12px;color:var(--accent)">💉 APLICAR</div><div class="flex-col gap10"><select id="aplProducto" onchange="calcDosisModal(${p})">${opts}</select><div id="dosisInfo" style="font-size:.7rem;color:var(--text-muted);background:rgba(255,255,255,.05);padding:8px">📋 Selecciona</div><input id="aplML" type="number" placeholder="ml" step=".1"><button class="btn btn-green mt8" onclick="aplicarProducto(${id})"><i class="fa-solid fa-check"></i> CONFIRMAR</button><button class="btn btn-gray" onclick="document.querySelector('.modal-overlay').remove()">CANCELAR</button></div>`);setTimeout(()=>calcDosisModal(p),100);}
function calcDosisModal(p){const s=document.getElementById('aplProducto'),i=document.getElementById('dosisInfo');if(!s||!i)return;const pr=getAllSanidad().find(x=>x.id===s.value);if(pr)i.innerHTML=`📋 Dosis: <b>${(p/pr.dosis).toFixed(1)} ml</b>`;}
function aplicarProducto(id){const pid=document.getElementById('aplProducto').value,ml=parseFloat(document.getElementById('aplML').value);if(isNaN(ml)||ml<=0)return showToast('⚠️ ml inválidos');const pr=getAllSanidad().find(x=>x.id===pid);if(!pr)return;const stS=getCfg('stockSanidad')||{}; if(ml>(stS[pid]||0))return showToast('⚠️ Stock insuficiente');const cu=pr.precioML||((getCfg('preciosSanidad')||{})[pid]||0),ct=ml*cu; if(!DB_CACHE.aplicaciones) DB_CACHE.aplicaciones=[]; DB_CACHE.aplicaciones.push({animalId:id,productoId:pid,producto:pr.nombre,ml,costo:ct,fecha:new Date().toLocaleDateString()}); stS[pid]=Math.max(0,(stS[pid]||0)-ml); setCfg('stockSanidad', stS); save(); document.querySelector('.modal-overlay').remove(); verificarRetiro(id); showToast('✅ Aplicado'); showProfile(id); }
function verificarRetiro(id){const a=DB_CACHE.animales.find(x=>x.id===id);if(!a)return;let mx=0;const apps=DB_CACHE.aplicaciones?DB_CACHE.aplicaciones.filter(x=>x.animalId===id):[];apps.forEach(ap=>{const pr=getAllSanidad().find(x=>x.id===ap.productoId);if(pr&&pr.retiro>0){const d=getDiasDesde(ap.fecha),r=pr.retiro-d;if(r>mx)mx=r;}});if(mx>0){a.bloqueadoPorRetiro=true;save();showToast(`⚠️ Retiro: ${mx}d`);}else a.bloqueadoPorRetiro=false;}
function showModalAsignarAlimento(id){const d=Object.values(DB_CACHE.inventario);if(!d.length)return showToast('⚠️ Crea alimentos primero');const as=DB_CACHE.asignacionesAlimentos?DB_CACHE.asignacionesAlimentos[id]:[],ids=as?as.map(a=>a.alimentoId):[];let opts='';d.forEach(i=>{if(ids.indexOf(i.id)===-1)opts+=`<option value="${i.id}">${i.nombre}</option>`;});if(!opts)return showToast('✅ Todos asignados');showModal(`<div style="font-weight:700;margin-bottom:12px;color:var(--accent)"><i class="fa-solid fa-wheat-awn"></i> ASIGNAR</div><div class="flex-col gap10"><select id="selAlimentoCustom">${opts}</select><input id="cantidadDiaria" type="number" step="any" placeholder="Cantidad"><button class="btn btn-green mt8" onclick="asignarAlimentoConStock(${id})"><i class="fa-solid fa-check"></i> ASIGNAR</button><button class="btn btn-gray" onclick="document.querySelector('.modal-overlay').remove()">CANCELAR</button></div>`);}
async function asignarAlimentoConStock(id){const s=document.getElementById('selAlimentoCustom'),c=parseFloat(document.getElementById('cantidadDiaria').value);if(!s||isNaN(c)||c<=0)return showToast('⚠️ Inválido');const aid=s.value,al=DB_CACHE.inventario[aid];if(!al)return;if(c>al.stock)return showToast('⚠️ Stock bajo');al.stock-=c;if(isIndexedDB) await DB.put('inventario', al); if(!DB_CACHE.asignacionesAlimentos) DB_CACHE.asignacionesAlimentos={}; if(!DB_CACHE.asignacionesAlimentos[id]) DB_CACHE.asignacionesAlimentos[id]=[]; DB_CACHE.asignacionesAlimentos[id].push({alimentoId:aid,cantidadDiaria:c,activo:true}); save(); document.querySelector('.modal-overlay').remove(); showToast('✅ Asignado'); showProfile(id); }
function toggleAlimentoCustom(id,aid){if(!DB_CACHE.asignacionesAlimentos||!DB_CACHE.asignacionesAlimentos[id])return;const i=DB_CACHE.asignacionesAlimentos[id].findIndex(a=>a.alimentoId===aid);if(i>-1){if(DB_CACHE.asignacionesAlimentos[id][i].activo){if(confirm('¿Quitar?')){DB_CACHE.asignacionesAlimentos[id].splice(i,1);save();showProfile(id);}}else{DB_CACHE.asignacionesAlimentos[id][i].activo=true;save();showProfile(id);}}}
function showReproModal(id){showModal(`<div style="font-weight:700;margin-bottom:12px;color:var(--accent)"><i class="fa-solid fa-calendar-check"></i> REGISTRO</div><div class="flex-col gap10"><select id="reTipo"><option value="parto">🐣 Parto</option><option value="insem">🐄 Inseminación</option><option value="secado">🛑 Secado</option></select><input id="reFecha" type="date"><button class="btn btn-green" onclick="guardarRepro(${id})"><i class="fa-solid fa-check"></i> GUARDAR</button><button class="btn btn-gray" onclick="document.querySelector('.modal-overlay').remove()">CANCELAR</button></div>`);}
async function guardarRepro(id){const t=document.getElementById('reTipo').value,f=document.getElementById('reFecha').value;if(!f)return showToast('⚠️ Selecciona fecha');const fd=f.split('-').reverse().join('/'),a=DB_CACHE.animales.find(x=>x.id===id);if(t==='parto'){a.fechaUltimoParto=fd;a.estadoReproductivo='parida';a.diasGestacion=0;}if(t==='insem'){a.fechaUltimaInseminacion=fd;a.estadoReproductivo='gestando';}if(t==='secado'){a.estadoReproductivo='seca';}if(isIndexedDB) await DB.put('animales', a); save(); document.querySelector('.modal-overlay').remove(); recalcularTodo(id); showToast('✅ Registrado'); }
function showModalGestionAlimentos(){showModal(`<div style="font-weight:700;margin-bottom:12px;color:var(--accent)"><i class="fa-solid fa-plus"></i> NUEVO ALIMENTO</div><div class="flex-col gap8"><input id="acNombre" type="text" placeholder="Nombre"><div class="grid"><select id="acIcono"><option value="fa-wheat-awn">🌾 Grano</option><option value="fa-seedling">🌱 Forraje</option></select><select id="acUnidad"><option value="kg">Kilogramos</option><option value="g">Gramos</option></select></div><div class="grid"><input id="acDosis" type="number" step="0.001" placeholder="Dosis/kg"><input id="acPrecioTotal" type="number" placeholder="Precio $"></div><div class="grid"><input id="acCantidadTotal" type="number" step="0.1" placeholder="Cantidad"><input id="acPrecioUnitario" type="text" readonly placeholder="Auto..."></div><button class="btn btn-green" onclick="guardarAlimentoCustom()"><i class="fa-solid fa-check"></i> GUARDAR</button></div>`);}
async function guardarAlimentoCustom(){const n=document.getElementById('acNombre').value.trim(),d=parseFloat(document.getElementById('acDosis').value),pt=parseFloat(document.getElementById('acPrecioTotal').value),ct=parseFloat(document.getElementById('acCantidadTotal').value);if(!n||isNaN(d)||isNaN(pt)||isNaN(ct))return showToast('⚠️ Completa');const id='ac_'+Date.now();const item={id,nombre:n,icono:document.getElementById('acIcono').value,unidad:document.getElementById('acUnidad').value,dosisPorKg:d,precioUnitario:pt/ct,stock:ct};DB_CACHE.inventario[id]=item;if(isIndexedDB) await DB.put('inventario', item); document.querySelector('.modal-overlay').remove(); showToast('✅ Agregado'); renderInsumos(); }
async function deleteAlimentoCustom(id){if(!confirm('¿Eliminar?'))return;delete DB_CACHE.inventario[id];if(isIndexedDB) await DB.clear('inventario'); Object.values(DB_CACHE.inventario).forEach(i => DB.put('inventario', i)); renderInsumos();}
function showModalGestionSanidad(){showModal(`<div style="font-weight:700;margin-bottom:12px;color:var(--accent)"><i class="fa-solid fa-plus"></i> NUEVO</div><div class="flex-col gap8"><input id="scNombre" type="text" placeholder="Nombre"><div class="grid"><select id="scIcono"><option value="fa-syringe">💉</option><option value="fa-pills">💊</option></select><input id="scColor" type="color" value="#a78bfa" style="width:100%;height:38px"></div><input id="scDosis" type="number" step="0.01" placeholder="ml/kg"><div class="grid"><input id="scEfecto" type="number" placeholder="Días efecto"><input id="scRetiro" type="number" placeholder="Días retiro"></div><div class="grid"><input id="scPrecioTotal" type="number" placeholder="Precio $"><input id="scMlTotal" type="number" placeholder="Mililitros"></div><button class="btn btn-green" onclick="guardarSanidadCustom()"><i class="fa-solid fa-check"></i> GUARDAR</button></div>`);}
async function guardarSanidadCustom(){const n=document.getElementById('scNombre').value.trim(),d=parseFloat(document.getElementById('scDosis').value),ef=parseInt(document.getElementById('scEfecto').value)||0,ret=parseInt(document.getElementById('scRetiro').value)||0,pt=parseFloat(document.getElementById('scPrecioTotal').value),ml=parseFloat(document.getElementById('scMlTotal').value);if(!n||isNaN(d)||isNaN(pt)||isNaN(ml))return showToast('⚠️ Completa');const id='sc_'+Date.now();const item={id,nombre:n,icono:document.getElementById('scIcono').value,color:document.getElementById('scColor').value,dosisPorKg:d,diasEfecto:ef,retiro:ret,precioML:pt/ml,stockML:ml};DB_CACHE.sanidad[id]=item;if(isIndexedDB) await DB.put('sanidad', item); document.querySelector('.modal-overlay').remove(); showToast('✅ Agregado'); renderInsumos(); }async function deleteSanidadCustom(id){if(!confirm('¿Eliminar?'))return;delete DB_CACHE.sanidad[id];if(isIndexedDB) await DB.clear('sanidad'); Object.values(DB_CACHE.sanidad).forEach(s => DB.put('sanidad', s)); renderInsumos();}
