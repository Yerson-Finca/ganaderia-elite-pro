    <style>
        :root {

<script>
// ==================== CONFIGURACIÓN GLOBAL v4.3.1 ====================
const APP_VERSION = '4.3.1';
const STORAGE_KEY = 'ganadero_elite_v' + APP_VERSION.replace('.','_');
let DB = {}, lastSaveTime = null, autoSaveTimer = null, saveTimeout = null, insumoTab = 'alimentos', searchTimeout = null;
const PRECIOS_REALISTAS = { pasto:80, salvado:900, melaza:1400, levadura:9000, bicarb:2500, sal:3000, urea:4000 };
const UNIDADES_DEFECTO = { pasto:'kg', salvado:'kg', melaza:'kg', levadura:'kg', bicarb:'kg', sal:'kg', urea:'kg' };
const MS_PASTO_FRESCO = 0.20, MS_SALVADO = 0.88, MS_MELAZA = 0.75, CONSUMO_MS_PV = 0.03;
const FD = { pasto:0.15, salvado:0.08, melaza:0.05, levadura:0.02, bicarb:0.03, sal:0.03, urea:0.02 };
const MICRO_FORMULAS = { sal:{type:'pv',factor:0.5}, bicarb:{type:'ms',factor:10}, levadura:{type:'pv',factor:0.05}, urea:{type:'ms',factor:11,maxPct:0.11} };
const TRIGGERS = { ureaMinWeight:150, pregnancyUreaBlockDay:210, maxRumenVolumePct:0.12 };

// ==================== UTILIDADES ====================
const fm = (n) => { if(isNaN(n)||n===null||n===undefined) return '0'; n=Math.round(n); var s=String(n); var r=''; var c=0; for(var i=s.length-1;i>=0;i--){if(c>0&&c%3===0) r='.'+r; r=s.charAt(i)+r; c++;} return r; };
const showToast = (m, d=3000) => { const t=document.createElement('div'); t.className='toast'; t.innerHTML=m; document.getElementById('toastContainer').appendChild(t); setTimeout(()=>t.remove(),d); };
const showModal = (h) => { const o=document.createElement('div'); o.className='modal-overlay'; o.innerHTML='<div class="modal">'+h+'</div>'; o.onclick=(e)=>{if(e.target===o)o.remove();}; document.getElementById('modalContainer').appendChild(o); };
const getDiasDesde = (f) => { if(!f) return 999; var p=f.split('/'); if(p.length<3) return 999; return Math.floor((new Date()-new Date(p[2],p[1]-1,p[0]))/864e5); };
const randColor = () => ['#ffb900','#22c55e','#3b82f6','#ef4444','#a78bfa','#f59e0b','#ec4899','#14b8a6'][Math.floor(Math.random()*8)];
const formatTimeAgo = (ts) => { if(!ts) return 'Nunca'; const diff=Math.floor((Date.now()-ts)/1000); if(diff<60) return 'hace '+diff+'s'; if(diff<3600) return 'hace '+Math.floor(diff/60)+'min'; if(diff<86400) return 'hace '+Math.floor(diff/3600)+'h'; return 'hace '+Math.floor(diff/86400)+'d'; };
const showSaveIndicator = () => { const el=document.getElementById('saveIndicator'); if(el){clearTimeout(saveTimeout); el.classList.add('visible'); saveTimeout=setTimeout(()=>el.classList.remove('visible'),2000);} };
const save = () => { try{DB._lastSave=Date.now(); localStorage.setItem(STORAGE_KEY,JSON.stringify(DB)); lastSaveTime=Date.now(); showSaveIndicator(); return true;} catch(e){console.error('Error guardando:',e); showToast('⚠️ Error al guardar'); return false;} };
const queueAutoSave = () => { clearTimeout(autoSaveTimer); autoSaveTimer=setTimeout(save,500); };

// ==================== BASE DE DATOS ====================
const AL = ['pasto','salvado','melaza','levadura','bicarb','sal','urea'];
const IC = { pasto:'fa-seedling', salvado:'fa-wheat-awn', melaza:'fa-droplet', levadura:'fa-flask', bicarb:'fa-cubes', sal:'fa-vial-circle-check', urea:'fa-flask-vial' };
const NM = { pasto:'Pasto Picado', salvado:'Salvado Trigo', melaza:'Melaza', levadura:'Levadura', bicarb:'Bicarbonato', sal:'Sal Mineral', urea:'UREA' };
const UNIDAD = { pasto:'kg', salvado:'kg', melaza:'kg', levadura:'g', bicarb:'g', sal:'g', urea:'g' };
const FACTOR_MS = { pasto:MS_PASTO_FRESCO, salvado:MS_SALVADO, melaza:MS_MELAZA, levadura:1, bicarb:1, sal:1, urea:1 };
const CATALOGO_SANIDAD = [
    {id:'modificador',nombre:'Modificador Orgánico',dosis:50,diasEfecto:90,retiro:0,icono:'fa-flask',color:'#22c55e'},
    {id:'vitaminaA',nombre:'Vitamina ADE',dosis:50,diasEfecto:60,retiro:30,icono:'fa-sun',color:'#ffb900'},
    {id:'complejoB',nombre:'Complejo B (B12)',dosis:50,diasEfecto:20,retiro:0,icono:'fa-capsules',color:'#3b82f6'},
    {id:'ivermectina1',nombre:'Ivermectina 1%',dosis:50,diasEfecto:30,retiro:28,icono:'fa-shield-virus',color:'#ef4444'},
    {id:'ivermectina315',nombre:'Ivermectina 3.15%',dosis:50,diasEfecto:90,retiro:122,icono:'fa-shield-halved',color:'#dc2626'},
    {id:'fosforo',nombre:'Fósforo B12',dosis:20,diasEfecto:30,retiro:0,icono:'fa-bone',color:'#a78bfa'},
    {id:'hierro',nombre:'Hierro Dextrano',dosis:100,diasEfecto:30,retiro:0,icono:'fa-droplet',color:'#f87171'}
];

const initDB = () => {
    try {
        const raw = localStorage.getItem(STORAGE_KEY); const parsed = raw ? JSON.parse(raw) : null;
        if(!parsed) throw new Error("Init");
        parsed.alimentosCustom = parsed.alimentosCustom || []; parsed.sanidadCustom = parsed.sanidadCustom || [];
        parsed.asignacionesAlimentos = parsed.asignacionesAlimentos || {};
        parsed.lotes = parsed.lotes || [{id:'lot_general',nombre:'General',color:'#ffb900'}];
        parsed.animales?.forEach(a => { 
            if(!a.loteId) a.loteId='lot_general'; 
            Object.assign(a, {litrosLeche:a.litrosLeche||0, transicionDias:a.transicionDias||0, transicionActiva:a.transicionActiva||false, bloqueadoPorRetiro:a.bloqueadoPorRetiro||false, diasGestacion:a.diasGestacion||0, fechaUltimaInseminacion:a.fechaUltimaInseminacion||null});
        });        Object.assign(parsed, {
            factoresDesperdicio: parsed.factoresDesperdicio || {...FD},
            precios: parsed.precios || {...PRECIOS_REALISTAS},
            unidadesPrecio: parsed.unidadesPrecio || {...UNIDADES_DEFECTO},
            precioLeche: parsed.precioLeche || 1200,
            valorCria: parsed.valorCria || 450000,
            intervaloPartos: parsed.intervaloPartos || 400,
            costosFijosMensuales: parsed.costosFijosMensuales || 300000
        });
        return parsed;
    } catch {
        return { animales:[], precios:{...PRECIOS_REALISTAS}, unidadesPrecio:{...UNIDADES_DEFECTO},
            stock:{pasto:500,salvado:200,melaza:50,levadura:10,bicarb:5,sal:2,urea:20},
            stockSanidad:{},preciosSanidad:{},aplicaciones:[],precioKG:9800,
            precioLeche:1200,valorCria:450000,intervaloPartos:400,costosFijosMensuales:300000,
            alimentosCustom:[],sanidadCustom:[],asignacionesAlimentos:{},
            lotes:[{id:'lot_general',nombre:'General',color:'#ffb900'}], factoresDesperdicio:{...FD}, _lastSave:null };
    }
};
DB = initDB(); if(DB._lastSave) lastSaveTime = DB._lastSave;

// ==================== MOTOR NUTRICIONAL & COSTOS ====================
const getDiet = (pv, prop, estado, transicionDias=0, diasGestacion=0, incluirFD=false) => { 
    if(pv<20) return {pasto:0,salvado:0,melaza:0,urea:0,bicarb:0,sal:0,levadura:0,_meta:{ureaBloqueada:false,motivo:null}};
    const msTotalRequerida = pv * CONSUMO_MS_PV;
    const esTernera = pv<150, p=prop||'carne', st=estado||'auto';
    const ureaPermitida = !(pv < TRIGGERS.ureaMinWeight || diasGestacion >= TRIGGERS.pregnancyUreaBlockDay);
    const calcMicro = (f,pv,ms) => f.type==='pv'?pv*f.factor:ms*f.factor;
    
    let msPasto=msTotalRequerida*0.90, msSalvado=msTotalRequerida*0.10, msMelaza=0;
    if(p==='carne'){if(esTernera)msMelaza=msTotalRequerida*0.02;else if(st==='venta')msMelaza=msTotalRequerida*0.05;else msMelaza=msTotalRequerida*0.03;}
    else if(p==='leche'){if(st==='parida')msMelaza=msTotalRequerida*0.03;else if(st==='seca')msMelaza=msTotalRequerida*0.01;else msMelaza=msTotalRequerida*0.01;}
    
    const toFresco = (ms,fMS,u) => u==='kg'?ms/fMS:(ms/fMS)*1000;
    let pastoFresco = toFresco(msPasto,FACTOR_MS.pasto,'kg');
    if(pastoFresco > pv*TRIGGERS.maxRumenVolumePct) pastoFresco = pv*TRIGGERS.maxRumenVolumePct;
    
    let dieta = {
        pasto:pastoFresco, salvado:toFresco(msSalvado,FACTOR_MS.salvado,'kg'), melaza:toFresco(msMelaza,FACTOR_MS.melaza,'kg'),
        levadura:calcMicro(MICRO_FORMULAS.levadura,pv,msTotalRequerida),
        bicarb:calcMicro(MICRO_FORMULAS.bicarb,pv,msTotalRequerida),
        sal:calcMicro(MICRO_FORMULAS.sal,pv,msTotalRequerida),
        urea:ureaPermitida?Math.min(calcMicro(MICRO_FORMULAS.urea,pv,msTotalRequerida),msTotalRequerida*0.11*1000):0,
        _meta:{ureaBloqueada:!ureaPermitida, motivo:pv<TRIGGERS.ureaMinWeight?'Peso<150kg':'Gestación>210d'}
    };
    
    if(transicionDias>0 && transicionDias<7){
        const f=transicionDias/7, dAnt={pasto:(pv*0.03*0.95)/MS_PASTO_FRESCO,salvado:(pv*0.03*0.05)/MS_SALVADO,melaza:(pv*0.03*0.01)/MS_MELAZA,urea:0,bicarb:(pv*0.03*0.10)*1000,sal:(pv*0.03*0.15)*1000,levadura:(pv*0.05/1000)*1000};
        Object.keys(dieta).forEach(k=>{if(k!=='_meta')dieta[k]=dAnt[k]+((dieta[k]-dAnt[k])*f);});
    }    if(incluirFD){const fd=DB.factoresDesperdicio||FD; Object.keys(dieta).forEach(k=>{if(k!=='_meta'&&fd[k])dieta[k]*=(1+fd[k]);});}
    return dieta;
};

const getCostoDiario = (pv, prop, estado) => { 
    const d = getDiet(pv, prop, estado, 0, 0, false);
    const pr = DB.precios || {};
    const unidades = DB.unidadesPrecio || UNIDADES_DEFECTO;
    return Object.keys(d).filter(k=>k!=='_meta').reduce((s,k)=>{
        const cant = d[k], precio = pr[k]||0, uCompra = unidades[k]||'kg';
        let factor = 1;
        if(UNIDAD[k]==='g' && uCompra==='kg') factor = 0.001;
        return s + (cant * precio * factor);
    },0);
};

const getCostoDiarioConFD = (pv, prop, estado) => { 
    const d = getDiet(pv, prop, estado, 0, 0, true);
    const pr = DB.precios || {};
    const unidades = DB.unidadesPrecio || UNIDADES_DEFECTO;
    const fd = DB.factoresDesperdicio || FD;
    return Object.keys(d).filter(k=>k!=='_meta').reduce((s,k)=>{
        const cant = d[k], precio = pr[k]||0, uCompra = unidades[k]||'kg';
        const cantConFD = cant * (1+(fd[k]||0));
        let factor = 1;
        if(UNIDAD[k]==='g' && uCompra==='kg') factor = 0.001;
        return s + (cantConFD * precio * factor);
    },0);
};

const getGMD = (h) => { 
    if(h.length<2) return 0.6; 
    const f=h[0], l=h[h.length-1]; const pF=f.fecha.split('/'), pL=l.fecha.split('/');
    const d=(new Date(pL[2],pL[1]-1,pL[0])-new Date(pF[2],pF[1]-1,pF[0]))/864e5; 
    if(d < 1) return 0.6;
    const gmd = (l.peso-f.peso)/d;
    return (gmd > 0 && gmd < 2) ? gmd : 0.6;
};

const getRendimiento = (h, gmdForzado=null) => { 
    if(h.length<2) return {nivel:'azul',texto:'Registre más',cm:0,color:'azul'}; 
    const g=gmdForzado||getGMD(h), r=g>0?g/0.8:0, c=((g-0.8)/0.8)*100;
    return r>=1.2?{nivel:'verde',texto:'Excelente',cm:c,color:'#22c55e'}:r>=0.9?{nivel:'azul',texto:'Bueno',cm:c,color:'#3b82f6'}:r>=0.7?{nivel:'naranja',texto:'Regular',cm:c,color:'#f59e0b'}:{nivel:'rojo',texto:'Bajo',cm:c,color:'#ef4444'};
};

const calcRepro = (a) => {
    if(a.proposito!=='leche' && !a.fechaUltimoParto) return null;
    if(!a.fechaUltimoParto) return {diasPP:0,diasParaParto:999,fechaProxParto:null,semaforo:{color:'#6b7280',txt:'📅 Sin registro',tipo:'gris'},estadoLactancia:'novilla',avisoSecado:false,diasGestacion:a.diasGestacion||0};
    const hoy=new Date(), parto=new Date(a.fechaUltimoParto.split('/').reverse().join('-')), diasPP=Math.max(0,Math.floor((hoy-parto)/864e5));
    const fpp=new Date(parto); fpp.setDate(parto.getDate()+285); const dpp=Math.floor((fpp-hoy)/864e5);    let dg=a.diasGestacion||0; if(a.fechaUltimaInseminacion){const ins=new Date(a.fechaUltimaInseminacion.split('/').reverse().join('-')); dg=Math.max(0,Math.floor((hoy-ins)/864e5));}
    let sem, est=a.estadoReproductivo||'parida';
    if(dpp<=60&&dpp>0){sem={color:'#3b82f6',txt:'🔵 Secado ('+dpp+'d)',tipo:'secado'};est='seca';}else if(diasPP<=60)sem={color:'#22c55e',txt:'🟢 Recuperación',tipo:'verde'};else if(diasPP<=150)sem={color:'#f59e0b',txt:'🟡 Ventana Monta',tipo:'amarillo'};else sem={color:'#ef4444',txt:'🔴 ALERTA Vacía',tipo:'rojo'};
    return {diasPP,diasParaParto:dpp,fechaProxParto:fpp.toLocaleDateString('es-CO'),semaforo:sem,estadoLactancia:est,avisoSecado:dpp<=60&&dpp>0,diasGestacion:dg};
};

const getEtapa = (pv,rep) => { var e=rep?rep.estadoLactancia:'auto'; if(e==='seca')return{nombre:'Vaca Seca',clase:'etapa-madurez',icono:'🥛',min:300,max:600,ureaBloqueada:false,color:'#3b82f6',siguiente:'Venta'}; if(e==='parida')return{nombre:'Producción',clase:'etapa-ceba',icono:'🐄',min:400,max:800,ureaBloqueada:false,color:'#22c55e',siguiente:'Venta'}; if(pv<150)return{nombre:'Cría',clase:'etapa-inicio',icono:'🐮',min:0,max:150,ureaBloqueada:true,color:'#ffb900',siguiente:'Levante'}; if(pv<350)return{nombre:'Levante',clase:'etapa-desarrollo',icono:'🐂',min:150,max:350,ureaBloqueada:false,color:'#60a5fa',siguiente:'Ceba'}; return{nombre:'Ceba',clase:'etapa-madurez',icono:'🐃',min:350,max:500,ureaBloqueada:false,color:'#fb923c',siguiente:'Venta'}; };
const getProgresoEtapa = (pv,e) => Math.min(100,Math.max(0,((pv-e.min)/(e.max-e.min))*100));

const getCostoAlimentosCustom = (aid,p) => { if(!DB.asignacionesAlimentos[aid])return 0; return DB.asignacionesAlimentos[aid].reduce((s,a)=>{if(!a.activo)return s;const i=DB.alimentosCustom.find(x=>x.id===a.alimentoId); return i?s+(p*(i.unidad==='g'?i.dosisPorKg*0.001:i.dosisPorKg)*i.precioUnitario):s;},0); };
const getAllSanidad = () => [...CATALOGO_SANIDAD.map(p=>({...p,esBase:true})),...DB.sanidadCustom.map(p=>({...p,esBase:false}))];
const getCostoSanidadDiario = (aid) => { let t=0; DB.aplicaciones.filter(x=>x.animalId===aid).forEach(ap=>{const p=getAllSanidad().find(x=>x.id===ap.productoId);if(p&&p.diasEfecto>0)t+=(ap.costo||0)/p.diasEfecto;});return t; };
const getCostoSanidadTotal = (aid) => DB.aplicaciones.filter(x=>x.animalId===aid).reduce((s,a)=>s+(a.costo||0),0);
const calcularROIA = (g,p,c) => c>0?(g*p)/c:0;

const calcularIngresoDiario = (a, gmd, precioKG) => {
    const gmdReal = (gmd > 0.01 && gmd < 2) ? gmd : 0.6;
    let ing = gmdReal * precioKG;
    if(a.proposito==='leche' && a.litrosLeche>0) ing += a.litrosLeche * (DB.precioLeche||1200);
    if(a.proposito==='leche' && (a.estadoReproductivo==='parida'||a.estadoReproductivo==='seca')) ing += (DB.valorCria||450000)/(DB.intervaloPartos||400);
    return ing;
};

const generarFlujoCajaMensual = (meses = 6) => {
    const cf = []; let saldo = 0;
    const cfM = DB.costosFijosMensuales || 300000;
    const precioBase = DB.precioKG || 9800;
    const estacionalidad = [1.0, 1.0, 1.0, 1.05, 1.05, 1.1];
    let breakEven = null, maxNeg = 0;

    DB.animales.forEach(a => {
        let p = a.historial[a.historial.length-1].peso, g = getGMD(a.historial);
        for(let m=0; m<meses; m++){
            const pMes = p + (g*30);
            let venta = 0;
            if(a.proposito==='carne' && p>=480 && (m>0 || p>=490)){ venta = p * (precioBase*estacionalidad[m%6]) * 0.95; p=0; }
            else if(p>0) p = pMes;
            const cd = getCostoDiarioConFD(p, a.proposito, calcRepro(a)?.estadoLactancia||'auto');
            const ingDia = calcularIngresoDiario(a, g, precioBase);
            const ingTotal = venta + (ingDia*30);
            const costoVar = cd*30 + getCostoSanidadDiario(a.id)*30;
            const neto = ingTotal - costoVar - (a === DB.animales[0] ? cfM : 0);
            saldo += neto;
            if(!cf[m]) cf[m] = {mes:m+1, ingresos:0, costosVar:0, fijos:0, neto:0, saldo:0};
            cf[m].ingresos += ingTotal; cf[m].costosVar += costoVar; cf[m].fijos += (a === DB.animales[0] ? cfM : 0); cf[m].neto += neto; cf[m].saldo = saldo;
            if(saldo>0 && !breakEven) breakEven = m+1;
            if(saldo<maxNeg) maxNeg = saldo;
        }
    });
    return { flujo:cf, saldoFinal:saldo, breakEven:breakEven||(saldo<0?'No alcanza':'N/A'), roi:saldo>0?(saldo/Math.abs(maxNeg||1)*100).toFixed(1):'N/A' };};

const getAlertasAnimal = (a) => { 
    const pv=a.historial[a.historial.length-1].peso, gmd=getGMD(a.historial), et=getEtapa(pv,calcRepro(a));
    const cd=getCostoDiario(pv,a.proposito,et.estadoLactancia), cdC=getCostoAlimentosCustom(a.id,pv);
    const roia=calcularROIA(gmd,DB.precioKG,cd+cdC); let al=[];
    if(roia<1.0&&gmd>0){if(!a.tags)a.tags=[];if(!a.tags.includes('Descarte'))a.tags.push('Descarte');al.push({t:'r',m:'📉 ROIA <1.0. Evaluar descarte.',icon:'fa-chart-line'});}
    else if(a.tags){a.tags=a.tags.filter(t=>t!=='Descarte');}
    if(a.fechaNacimiento){const ed=Math.floor((new Date()-new Date(a.fechaNacimiento))/864e5);if(ed>=15&&ed<=30)al.push({t:'warning',m:'✂️ Descornado/palpar',icon:'fa-calendar-check'});if(ed>=210&&pv<=150&&et.nombre==='Cría')al.push({t:'info',m:'🍼 Destete recomendado',icon:'fa-baby-carriage'});}
    if(gmd>0&&gmd<0.4)al.push({t:'purple',m:'⚠️ GMD bajo (<0.4)',icon:'fa-arrow-trend-down'});
    if(a.proposito==='leche'&&!a.fechaUltimoParto&&pv>=320)al.push({t:'info',m:'🐂 Habilitar monta',icon:'fa-venus-mars'});
    var tm=false,tiv=false; DB.aplicaciones.filter(x=>x.animalId===a.id).forEach(ap=>{const pr=getAllSanidad().find(x=>x.id===ap.productoId); if(pr){if(pr.id==='modificador'&&getDiasDesde(ap.fecha)<pr.diasEfecto)tm=true;if(pr.id.includes('ivermectina')&&getDiasDesde(ap.fecha)<pr.diasEfecto)tiv=true;if(pr.retiro>0&&getDiasDesde(ap.fecha)<pr.retiro){al.push({t:'r',m:'🚫 VEDA: '+pr.nombre,icon:'fa-clock'});a.bloqueadoPorRetiro=true;}else a.bloqueadoPorRetiro=false;}});
    if(gmd>0&&gmd<0.4&&!tm)al.push({t:'purple',m:'Aplicar Modificador',icon:'fa-flask'}); 
    if(!tiv)al.push({t:'r',m:'Desparasitación vencida',icon:'fa-shield-virus'}); 
    return al; 
};

const getAguaDiaria = (pv, prop, ll=0) => prop==='leche'?pv*0.1+ll*3:pv*0.1;

const calcularAutonomiaBodega = () => { const ct={pasto:0,salvado:0,melaza:0,levadura:0,bicarb:0,sal:0,urea:0}, fd=DB.factoresDesperdicio||FD; DB.animales.forEach(a=>{const p=a.historial[a.historial.length-1].peso, d=getDiet(p,a.proposito,calcRepro(a)?.estadoLactancia||'auto',a.transicionDias||0,0,true); Object.keys(ct).forEach(k=>ct[k]+=(d[k]||0)*(1+(fd[k]||0))); }); const au={}; Object.keys(DB.stock).forEach(k=>{const s=DB.stock[k]||0, c=ct[k]||0.001; au[k]=c>0?Math.floor(s/c):999;}); return {consumo:ct, autonomia:au}; };
const descontarInventarioDiario = () => { const {consumo}=calcularAutonomiaBodega(); Object.keys(consumo).forEach(k=>{if(DB.stock[k]!==undefined){DB.stock[k]=Math.max(0,DB.stock[k]-consumo[k]);if(DB.stock[k]<consumo[k]*3)showToast(`⚠️ Stock bajo: ${NM[k]}`,5000);}}); save(); };

function renderConfig(){const ls=lastSaveTime?formatTimeAgo(lastSaveTime):'Nunca';document.getElementById('v-config').innerHTML=`<div class="card"><div class="config-item" onclick="exportData()"><i class="fa-solid fa-download"></i><div class="cfg-text"><span>Exportar Respaldo</span><small>Descargar JSON</small></div><i class="fa-solid fa-chevron-right" style="color:var(--text-muted)"></i></div><div class="config-item" onclick="importData()"><i class="fa-solid fa-upload"></i><div class="cfg-text"><span>Importar Datos</span><small>Restaurar archivo</small></div><i class="fa-solid fa-chevron-right" style="color:var(--text-muted)"></i></div><div class="config-item" onclick="if(confirm('⚠️ ¿Borrar TODOS los datos? Esta acción no se puede deshacer.')){localStorage.clear();location.reload();}"><i class="fa-solid fa-trash-can" style="color:var(--danger)"></i><div class="cfg-text"><span style="color:var(--danger)">Borrar Todo</span><small>Eliminar base de datos</small></div><i class="fa-solid fa-chevron-right" style="color:var(--text-muted)"></i></div><div class="row"><span class="row-label"><i class="fa-solid fa-calculator"></i> Descontar inventario diario</span><button class="btn btn-sm btn-green" style="width:auto;padding:8px 14px;margin:0" onclick="descontarInventarioDiario();renderInsumos()"><i class="fa-solid fa-arrow-down"></i> Ejecutar</button></div><div class="row"><span class="row-label"><i class="fa-solid fa-floppy-disk"></i> Auto-guardado</span><span class="row-val" style="color:var(--success)">✅ Activo</span></div><div class="row"><span class="row-label"><i class="fa-solid fa-clock"></i> Último guardado</span><span class="row-val">${ls}</span></div></div><div class="card" style="text-align:center;padding:30px 20px"><div style="font-size:2.5rem;margin-bottom:12px"><svg class="crown-svg" viewBox="0 0 24 24" style="width:56px;height:56px"><path d="M2.5 18.5l1.5-12 5.5 4 2.5-6 2.5 6 5.5-4 1.5 12h-19z"/></svg></div><div style="font-weight:800;font-size:1.1rem;color:var(--accent-text)">GANADERO ÉLITE PRO</div><div style="font-size:.7rem;color:var(--text-muted);margin-top:6px">Versión ${APP_VERSION} · Motor Nutricional v2</div><div style="font-size:.65rem;color:var(--text-muted);margin-top:10px">${DB.animales.length} animales · ${DB.lotes.length} lotes</div><input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)"></div>`;}
function exportData(){const b=new Blob([JSON.stringify(DB)],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=`ganadero_backup_v${APP_VERSION}_${new Date().toISOString().slice(0,10)}.json`;a.click();showToast('✅ Respaldo descargado');}
function importData(){document.getElementById('importFile').click();}
function handleImport(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.animales&&d.precios){DB=d;if(!DB.lotes)DB.lotes=[{id:'lot_general',nombre:'General',color:'#ffb900'}];DB.animales.forEach(a=>Object.assign(a,{litrosLeche:0,transicionDias:0,transicionActiva:false,bloqueadoPorRetiro:false,diasGestacion:0,fechaUltimaInseminacion:null}));save();showToast('✅ Datos importados');goPage('inicio');}else showToast('⚠️ Archivo inválido');}catch{showToast('⚠️ Error al leer');}};r.readAsText(f);}

function showProfile(id){

    const valA=p*DB.precioKG,proy30=p+(gmd*30),faltaKg=et.max-p,progPct=getProgresoEtapa(p,et);
    let etxt='--';if(a.fechaNacimiento){const n=new Date(a.fechaNacimiento),h=new Date(),d=Math.ceil(Math.abs(h-n)/864e5);etxt=d>60?`${Math.floor(d/30)} meses`:`${d} días`;}
    const mama=a.madreId?(DB.animales.find(x=>x.id==a.madreId)?.nombre||'Desconocida'):'--';
    let alH=getAlertasAnimal(a).map(s=>`<div class="alert-item alert-${s.t==='r'?'danger':s.t==='purple'?'purple':'warning'}"><i class="fa-solid ${s.icon}"></i> ${s.m}</div>`).join('');if(!alH)alH='<div style="text-align:center;padding:14px;color:var(--success);background:rgba(34,197,94,.08);border-radius:16px;border:1px solid rgba(34,197,94,.15)"><i class="fa-solid fa-check-circle"></i> Todo en orden</div>';
    let fH='<div class="sp-card"><div class="sp-card-title"><i class="fa-solid fa-clock-rotate-left"></i> HISTORIAL</div>';
    a.historial.slice().reverse().slice(0,5).forEach((h,i)=>{const pr=a.historial[a.historial.length-2-i];const dl=pr?`+${(((h.peso-pr.peso)/pr.peso)*100).toFixed(1)}%`:'Inicio';const cl=pr?(h.peso>=pr.peso?'#22c55e':'#ef4444'):'var(--accent-text)';fH+=`<div class="row"><span class="row-label"><i class="fa-solid fa-weight-scale"></i> ${fm(h.peso)}kg</span><span class="row-val"><span style="color:${cl};font-weight:700">${dl}</span> <span style="color:var(--text-muted)">${h.fecha}</span></span></div>`;});fH+='</div>';
    const d=getDiet(p,a.proposito,rep?.estadoLactancia||'auto',a.transicionDias||0,rep?.diasGestacion||0);
    let diH=`<div class="sp-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div class="sp-card-title" style="margin-bottom:0"><i class="fa-solid fa-mortar-pestle"></i> DIETA <span class="ms-badge">MS+FD</span>${d._meta?.ureaBloqueada?' <span class="trigger-badge">🔒 Urea</span>':''}</div><button class="btn btn-sm btn-purple" style="width:auto;padding:8px 12px;margin:0" onclick="showModalAsignarAlimento(${id})"><i class="fa-solid fa-plus"></i> Agregar</button></div>`;
    const ub=d.urea===0&&a.proposito!=='leche';if(ub)diH+=`<div style="background:rgba(239,68,68,.1);color:#f87171;padding:10px;border-radius:12px;font-size:.78rem;margin-bottom:12px;display:flex;align-items:center;gap:8px"><i class="fa-solid fa-lock"></i> Urea bloqueada: ${d._meta?.motivo||'Seguridad'}</div>`;
    AL.forEach(k=>{const v=d[k],u=UNIDAD[k],dp=u==='kg'?v.toFixed(1):Math.round(v);const ms=(k==='pasto'||k==='salvado'||k==='melaza')?`<span style="font-size:.68rem;color:var(--text-muted)"> = ${(v*FACTOR_MS[k]).toFixed(2)}kg MS</span>`:'';const fd=`<span class="fd-badge">+${Math.round((DB.factoresDesperdicio[k]||0)*100)}%</span>`;const s=(k==='urea'&&ub)?'opacity:0.5;text-decoration:line-through':'';diH+=`<div class="row" style="${s}"><span class="row-label"><i class="fa-solid ${IC[k]}"></i> ${NM[k]} ${fd}</span><span class="row-val">${k==='urea'&&ub?'0 (Bloqueado)':dp+u}${ms}</span></div>`;});diH+='</div>';
    let rH='';if(a.proposito==='leche'&&rep){const sem=rep.semaforo;rH=`<div class="sp-card" style="border-left:5px solid ${sem.color}"><div class="sp-card-title"><i class="fa-solid fa-calendar-days"></i> REPRODUCTIVO</div><div style="text-align:center;padding:12px;background:${sem.color}15;border-radius:14px;margin-bottom:14px"><div style="font-size:1.6rem;font-weight:800;color:${sem.color}">${sem.txt}</div><div style="font-size:.72rem;color:var(--text-muted);margin-top:4px">PP: ${rep.diasPP}${rep.diasGestacion>0?` · Gest: ${rep.diasGestacion}d`:''}</div></div><div class="row"><span class="row-label"><i class="fa-solid fa-baby"></i> Próximo parto</span><span class="row-val">${rep.fechaProxParto}</span></div>${rep.avisoSecado?'<div style="margin-top:12px;background:rgba(59,130,246,.1);color:#60a5fa;padding:10px;border-radius:12px;font-size:.78rem;text-align:center;font-weight:600">💧 <b>Dieta Seca:</b> Iniciar en 60 días</div>':''}<button class="btn btn-sm btn-purple mt8" onclick="showReproModal(${id})"><i class="fa-solid fa-pen"></i> Registrar Evento</button></div>`;}
    const gv=a.historial.length>=2&&gmd>0.01?gmd:0.6,cd=getCostoDiario(p,a.proposito,rep?.estadoLactancia||'auto'),csd=getCostoSanidadDiario(id),cdC=getCostoAlimentosCustom(id,p),ct=cd+cdC+csd;const ckp=gv>0?ct/gv:null;const ingDiario=calcularIngresoDiario(a,gv,DB.precioKG),mgDiario=ingDiario-ct,clMg=mgDiario>=0?'#22c55e':'#ef4444';const roia=calcularROIA(gv,DB.precioKG,ct),agua=getAguaDiaria(p,a.proposito,a.litrosLeche||0),proy15=p+(gv*15),proy60=p+(gv*60);
    let hiH='';if(a.proposito==='leche'){const hs=DB.animales.filter(h=>h.madreId==a.id);if(hs.length){hiH='<div class="sp-card"><div class="sp-card-title"><i class="fa-solid fa-children"></i> CRÍAS REGISTRADAS</div>';hs.forEach(h=>{hiH+=`<div class="row" onclick="showProfile(${h.id})" style="cursor:pointer"><span class="row-label"><i class="fa-solid fa-cow"></i> ${h.nombre}</span><span class="row-val">${fm(h.historial[h.historial.length-1].peso)}kg</span></div>`;});hiH+='</div>';}}
    const fH2=`<div class="sp-card" style="background:linear-gradient(145deg, rgba(255,185,0,.06), rgba(255,185,0,.02)); border:1px solid rgba(255,185,0,.15)"><div class="sp-card-title" style="color:var(--accent-text)"><i class="fa-solid fa-chart-line"></i> RENTABILIDAD</div><div class="sp-projection"><div class="sp-proj-box"><div class="sp-proj-d">15 DÍAS</div><div class="sp-proj-w">${fm(proy15)}kg</div><div class="sp-proj-g" style="color:#22c55e">+$${fm((proy15-p)*DB.precioKG)}</div></div><div class="sp-proj-box"><div class="sp-proj-d">30 DÍAS</div><div class="sp-proj-w">${fm(proy30)}kg</div><div class="sp-proj-g" style="color:#22c55e">+$${fm((proy30-p)*DB.precioKG)}</div></div><div class="sp-proj-box"><div class="sp-proj-d">META 500</div><div class="sp-proj-w">${Math.ceil((500-p)/gv)}d</div><div class="sp-proj-g" style="color:var(--accent-text)">ROIA: ${roia.toFixed(2)}x</div></div></div><div style="margin-top:14px;padding:12px;background:rgba(0,0,0,.3);border-radius:14px;text-align:center;border:1px solid ${mgDiario>=0?'rgba(34,197,94,.2)':'rgba(239,68,68,.2)'}"><div style="font-size:.7rem;color:var(--text-muted);margin-bottom:6px;font-weight:600">MARGEN DIARIO NETO</div><div style="font-size:1.5rem;font-weight:800;color:${clMg}">$ ${fm(mgDiario)}</div><div style="font-size:.65rem;color:var(--text-muted);margin-top:4px">Ingreso: $${fm(ingDiario)} · Costo: $${fm(ct)} · Agua: ${agua.toFixed(1)} L/d</div></div></div>`;
    const html=`<div class="sp-wrapper"><div class="sp-banner"><button class="sp-back" onclick="closeProfile()"><i class="fa-solid fa-arrow-left"></i></button><button class="sp-back" style="left:auto;right:16px;background:rgba(239,68,68,.25);color:#f87171;border:1px solid rgba(239,68,68,.2)" onclick="confirmDeleteAnimal(${id})"><i class="fa-solid fa-trash-can"></i></button></div><div class="sp-header"><div class="sp-avatar">${et.icono}</div><div class="sp-name">${a.nombre}</div><div class="sp-badges"><span class="sp-badge" style="background:${et.color}25;color:${et.color};border:1px solid ${et.color}40">${et.nombre}</span><span class="sp-badge">${getLoteName(a.loteId)}</span><span class="sp-badge">${a.proposito==='carne'?'🥩 Carne':'🥛 Leche'}</span></div><div class="sp-meta">${fm(p)}kg · ${r.texto} · Edad: <b>${etxt}</b> · Mama: <b>${mama}</b></div></div><div class="sp-stats"><div class="sp-stat"><div class="val">${fm(p)}</div><div class="lbl">Peso</div></div><div class="sp-stat"><div class="val">$${fm(valA)}</div><div class="lbl">Valor</div></div><div class="sp-stat"><div class="val">${gmd.toFixed(2)}</div><div class="lbl">GMD</div></div><div class="sp-stat"><div class="val">${ckp!==null?'$'+fm(ckp):'--'}</div><div class="lbl">Costo/kg</div></div></div><div class="stage-progress-container"><div class="stage-progress-labels"><span>Etapa Actual</span><span>Meta: ${et.siguiente}</span></div><div class="stage-progress-bar"><div class="stage-progress-fill" style="width:${progPct}%;background:${et.color}"><span class="stage-progress-text">${faltaKg<=0?'✅ VENDIBLE':fm(faltaKg)+'kg faltan'}</span></div></div></div><div class="sp-scroll">${alH}${fH}${diH}${rH}${hiH}${fH2}</div><div class="sp-actions-bar"><button class="btn btn-gold" onclick="updateWeight(${id})"><i class="fa-solid fa-gauge-high"></i> PESAJE</button><button class="btn btn-purple" onclick="openAplicarProducto(${id})"><i class="fa-solid fa-syringe"></i> SANIDAD</button><button class="btn btn-green" onclick="showModalAsignarAlimento(${id})"><i class="fa-solid fa-plus"></i> ALIMENTO</button></div></div>`;
    document.querySelectorAll('.page').forEach(el=>el.classList.add('hidden'));document.getElementById('v-perfil').classList.remove('hidden');document.getElementById('v-perfil').innerHTML=html;document.querySelector('header').classList.remove('hidden');
}

function confirmDeleteAnimal(id){const a=DB.animales.find(x=>x.id===id);showModal(`<div style="text-align:center;padding:12px 0"><i class="fa-solid fa-triangle-exclamation" style="font-size:3.5rem;color:var(--warning);margin-bottom:18px"></i><h3 style="margin-bottom:10px;font-size:1.2rem">¿Eliminar a ${a.nombre}?</h3><p style="color:var(--text-muted);margin-bottom:22px;font-size:.9rem">Se borrará todo el historial, asignaciones y datos financieros.</p><button class="btn btn-danger" onclick="deleteAnimal(${id})"><i class="fa-solid fa-trash-can"></i> SÍ, ELIMINAR</button><button class="btn btn-gray mt8" onclick="document.querySelector('.modal-overlay').remove()">CANCELAR</button></div>`);}
function toggleOrigenFields(){const o=document.getElementById('addOrig')?.value,n=document.getElementById('nacimientoFields'),c=document.getElementById('compradoFields');if(n)n.classList.toggle('hidden',o!=='nacimiento');if(c)c.classList.toggle('hidden',o!=='comprado');}
function showAddAnimalModal(){let opts=DB.lotes.map(l=>`<option value="${l.id}">${l.nombre}</option>`).join(''),moms='<option value="">-- Sin Madre --</option>';DB.animales.forEach(a=>{if(a.proposito==='leche')moms+=`<option value="${a.id}">${a.nombre} (${a.estadoReproductivo||'Novilla'})</option>`;});showModal(`<div style="font-weight:800;margin-bottom:16px;color:var(--accent-text);font-size:1.1rem"><i class="fa-solid fa-cow"></i> NUEVO ANIMAL</div><div class="flex-col gap10"><input id="addN" type="text" placeholder="Nombre o Número de arete"><input id="addW" type="number" placeholder="Peso Inicial (kg)" min="20" max="2000"><select id="addLote">${opts}</select><div class="grid"><select id="addProp"><option value="carne">🥩 CARNE</option><option value="leche">🥛 LECHE</option></select><select id="addOrig" onchange="toggleOrigenFields()"><option value="nacimiento">🐄 Nacimiento</option><option value="comprado">💰 Comprado</option></select></div><div id="nacimientoFields" class="flex-col gap8"><div class="row-label"><i class="fa-solid fa-calendar-days"></i> Fecha de Nacimiento</div><input id="addFechaNac" type="date"><div class="row-label"><i class="fa-solid fa-venus"></i> Seleccionar Madre</div><select id="addMama">${moms}</select></div><div id="compradoFields" class="hidden"><input id="addPrice" type="number" placeholder="Valor de compra ($)"></div><button class="btn btn-gold mt12" onclick="guardarNuevoAnimal()"><i class="fa-solid fa-check"></i> REGISTRAR ANIMAL</button><button class="btn btn-gray" onclick="document.querySelector('.modal-overlay').remove()">CANCELAR</button></div>`);}function guardarNuevoAnimal(){const n=document.getElementById('addN').value.trim(),w=parseFloat(document.getElementById('addW').value),lote=document.getElementById('addLote').value,p=document.getElementById('addProp').value,orig=document.getElementById('addOrig').value,fn=document.getElementById('addFechaNac')?.value,mi=document.getElementById('addMama')?.value,pr=parseFloat(document.getElementById('addPrice')?.value)||0;if(!n||isNaN(w)||w<20||w>2000)return showToast('⚠️ Verifica nombre y peso');const fh=new Date().toLocaleDateString(),fr=(orig==='nacimiento'&&fn)?fn.split('-').reverse().join('/'):fh;DB.animales.push({id:Date.now(),nombre:n,historial:[{fecha:fr,peso:w}],proposito:p,origen:orig,valorCompra:pr,fechaUltimoParto:null,estadoReproductivo:'novilla',loteId:lote,fechaNacimiento:fn||null,madreId:mi||null,tags:[],litrosLeche:0,transicionDias:0,transicionActiva:false,bloqueadoPorRetiro:false,diasGestacion:0,fechaUltimaInseminacion:null});save();document.querySelector('.modal-overlay').remove();showToast(`✅ ${n} registrado exitosamente`);goPage('animales');}
function showAddLoteModal(){showModal(`<div style="font-weight:800;margin-bottom:14px;color:var(--accent-text)"><i class="fa-solid fa-plus"></i> NUEVO LOTE</div><div class="flex-col gap10"><input id="nlNombre" type="text" placeholder="Nombre del lote"><input id="nlColor" type="color" value="${randColor()}" style="width:100%;height:44px;border-radius:12px"><button class="btn btn-gold mt8" onclick="guardarLote()"><i class="fa-solid fa-check"></i> CREAR LOTE</button><button class="btn btn-gray" onclick="document.querySelector('.modal-overlay').remove()">CANCELAR</button></div>`);}
function guardarLote(){const n=document.getElementById('nlNombre').value.trim(),c=document.getElementById('nlColor').value;if(!n)return showToast('⚠️ Ingresa un nombre');DB.lotes.push({id:'lot_'+Date.now(),nombre:n,color:c});save();document.querySelector('.modal-overlay').remove();showToast(`✅ Lote "${n}" creado`);renderLotes();}
function showEditLoteColor(lid){const l=DB.lotes.find(x=>x.id===lid);if(!l)return;showModal(`<div style="font-weight:800;margin-bottom:14px;color:var(--accent-text)"><i class="fa-solid fa-palette"></i> CAMBIAR COLOR</div><div class="flex-col gap10"><input id="elColor" type="color" value="${l.color}" style="width:100%;height:50px;border-radius:12px"><button class="btn btn-green mt8" onclick="guardarColorLote('${lid}')"><i class="fa-solid fa-check"></i> GUARDAR</button><button class="btn btn-gray" onclick="document.querySelector('.modal-overlay').remove()">CANCELAR</button></div>`);}
function guardarColorLote(lid){const l=DB.lotes.find(x=>x.id===lid);if(l)l.color=document.getElementById('elColor').value;save();document.querySelector('.modal-overlay').remove();renderLotes();showToast('✅ Color actualizado');}
function deleteLote(lid){if(lid==='lot_general')return showToast('⚠️ No puedes eliminar el lote General');if(!confirm('¿Eliminar este lote? Los animales pasarán a "General"'))return;DB.animales.forEach(a=>{if(a.loteId===lid)a.loteId='lot_general';});DB.lotes=DB.lotes.filter(l=>l.id!==lid);save();renderLotes();showToast('✅ Lote eliminado');}
function updateWeight(id){
    const a=DB.animales.find(x=>x.id===id);if(!a)return;
    const ow=a.historial[a.historial.length-1].peso;
    const p=prompt(`⚖️ Nuevo peso (kg):\nActual: ${ow}kg`, '');
    if(!p)return;
    const peso=parseFloat(p);
    if(isNaN(peso)||peso<20||peso>2000)return showToast('⚠️ Peso inválido');
    if(peso<ow&&!confirm('⚠️ El peso es menor al anterior. ¿Continuar?'))return;
    
    const fechaInput = prompt(`📅 Fecha del pesaje:\nFormato: DD/MM/AAAA\nPor defecto: hoy`, new Date().toLocaleDateString());
    const fechaFinal = fechaInput ? fechaInput : new Date().toLocaleDateString();
    const partes = fechaFinal.split('/');
    if(partes.length !== 3) { showToast('⚠️ Formato de fecha inválido. Use DD/MM/AAAA'); return; }
    
    a.historial.push({fecha:fechaFinal, peso:peso});
    recalcularTodo(id);
}
function recalcularTodo(id){const a=DB.animales.find(x=>x.id===id);if(!a)return;const p=a.historial[a.historial.length-1].peso,et=getEtapa(p,calcRepro(a));if(a.fechaNacimiento&&p<=150){const ed=Math.floor((new Date()-new Date(a.fechaNacimiento))/864e5);if(ed>=210&&et.nombre==='Cría'){a.estadoReproductivo='destetado';a.transicionActiva=true;a.transicionDias=1;showToast('🍼 Destete automático aplicado a Levante');}}save();showProfile(id);}
function deleteAnimal(id){DB.animales=DB.animales.filter(x=>x.id!==id);delete DB.asignacionesAlimentos[id];save();document.querySelector('.modal-overlay').remove();closeProfile();showToast('✅ Animal eliminado');}
function closeProfile(){document.getElementById('v-perfil').classList.add('hidden');document.querySelector('header').classList.remove('hidden');goPage('animales');}
function openAplicarProducto(id){const a=DB.animales.find(x=>x.id===id);if(!a)return;const p=a.historial[a.historial.length-1].peso;let opts=getAllSanidad().map(pr=>`<option value="${pr.id}">${pr.nombre} (${pr.diasEfecto}d)</option>`).join('');showModal(`<div style="font-weight:800;margin-bottom:14px;color:var(--accent-text)">💉 APLICAR A ${a.nombre}</div><div class="flex-col gap10"><select id="aplProducto" onchange="calcDosisModal(${p})">${opts}</select><div id="dosisInfo" style="font-size:.75rem;color:var(--text-muted);background:rgba(255,255,255,.05);padding:10px;border-radius:12px">📋 Selecciona un producto</div><input id="aplML" type="number" placeholder="Mililitros aplicados" step=".1"><button class="btn btn-green mt8" onclick="aplicarProducto(${id})"><i class="fa-solid fa-check"></i> CONFIRMAR APLICACIÓN</button><button class="btn btn-gray" onclick="document.querySelector('.modal-overlay').remove()">CANCELAR</button></div>`);setTimeout(()=>calcDosisModal(p),100);}
function calcDosisModal(p){const s=document.getElementById('aplProducto'),i=document.getElementById('dosisInfo');if(!s||!i)return;const pr=getAllSanidad().find(x=>x.id===s.value);if(pr)i.innerHTML=`📋 Dosis recomendada: <b style="color:#fff">${(p/pr.dosis).toFixed(1)} ml</b> (${pr.nombre})`;}
function aplicarProducto(id){const pid=document.getElementById('aplProducto').value,ml=parseFloat(document.getElementById('aplML').value);if(isNaN(ml)||ml<=0)return showToast('⚠️ Ingresa ml válidos');const pr=getAllSanidad().find(x=>x.id===pid);if(!pr)return;if(ml>(DB.stockSanidad[pid]||0))return showToast('⚠️ Stock insuficiente');const cu=pr.precioML||DB.preciosSanidad[pid]||0,ct=ml*cu;DB.aplicaciones.push({animalId:id,productoId:pid,producto:pr.nombre,ml,costo:ct,fecha:new Date().toLocaleDateString()});DB.stockSanidad[pid]=Math.max(0,(DB.stockSanidad[pid]||0)-ml);save();document.querySelector('.modal-overlay').remove();verificarRetiro(id);showToast('✅ Aplicación registrada');showProfile(id);}
function verificarRetiro(id){const a=DB.animales.find(x=>x.id===id);if(!a)return;let mx=0;DB.aplicaciones.filter(x=>x.animalId===id).forEach(ap=>{const pr=getAllSanidad().find(x=>x.id===ap.productoId);if(pr&&pr.retiro>0){const d=getDiasDesde(ap.fecha),r=pr.retiro-d;if(r>mx)mx=r;}});if(mx>0){a.bloqueadoPorRetiro=true;save();showToast(`⚠️ Retiro farmacológico activo: ${mx} días`);}else a.bloqueadoPorRetiro=false;}
function showModalAsignarAlimento(id){const d=DB.alimentosCustom;if(!d.length)return showToast('⚠️ Crea alimentos personalizados primero');const as=DB.asignacionesAlimentos[id]||[],ids=as.map(a=>a.alimentoId);let opts='';d.forEach(i=>{if(ids.indexOf(i.id)===-1)opts+=`<option value="${i.id}">${i.nombre} (${i.dosisPorKg} ${i.unidad}/kg)</option>`;});if(!opts)return showToast('✅ Todos los alimentos están asignados');showModal(`<div style="font-weight:800;margin-bottom:14px;color:var(--accent-text)"><i class="fa-solid fa-wheat-awn"></i> ASIGNAR ALIMENTO</div><div class="flex-col gap10"><select id="selAlimentoCustom">${opts}</select><input id="cantidadDiaria" type="number" step="any" placeholder="Cantidad diaria"><button class="btn btn-green mt8" onclick="asignarAlimentoConStock(${id})"><i class="fa-solid fa-check"></i> ASIGNAR</button><button class="btn btn-gray" onclick="document.querySelector('.modal-overlay').remove()">CANCELAR</button></div>`);}
function asignarAlimentoConStock(id){const s=document.getElementById('selAlimentoCustom'),c=parseFloat(document.getElementById('cantidadDiaria').value);if(!s||isNaN(c)||c<=0)return showToast('⚠️ Ingresa una cantidad válida');const aid=s.value,al=DB.alimentosCustom.find(x=>x.id===aid);if(!al)return;if(c>al.stock)return showToast('⚠️ Stock insuficiente');al.stock-=c;if(!DB.asignacionesAlimentos[id])DB.asignacionesAlimentos[id]=[];DB.asignacionesAlimentos[id].push({alimentoId:aid,cantidadDiaria:c,activo:true});save();document.querySelector('.modal-overlay').remove();showToast('✅ Alimento asignado');showProfile(id);}
function toggleAlimentoCustom(id,aid){if(!DB.asignacionesAlimentos[id])return;const i=DB.asignacionesAlimentos[id].findIndex(a=>a.alimentoId===aid);if(i>-1){if(DB.asignacionesAlimentos[id][i].activo){if(confirm('¿Desactivar este alimento?')){DB.asignacionesAlimentos[id].splice(i,1);save();showProfile(id);}}else{DB.asignacionesAlimentos[id][i].activo=true;save();showProfile(id);}}}
function showReproModal(id){showModal(`<div style="font-weight:800;margin-bottom:14px;color:var(--accent-text)"><i class="fa-solid fa-calendar-check"></i> REGISTRO REPRODUCTIVO</div><div class="flex-col gap10"><select id="reTipo"><option value="parto">🐣 Parto</option><option value="insem">🐄 Inseminación</option><option value="secado">🛑 Secado</option><option value="venta">💰 Venta/Descarte</option></select><input id="reFecha" type="date"><button class="btn btn-green" onclick="guardarRepro(${id})"><i class="fa-solid fa-check"></i> GUARDAR</button><button class="btn btn-gray" onclick="document.querySelector('.modal-overlay').remove()">CANCELAR</button></div>`);}
function guardarRepro(id){const t=document.getElementById('reTipo').value,f=document.getElementById('reFecha').value;if(!f)return showToast('⚠️ Selecciona fecha');const fd=f.split('-').reverse().join('/'),a=DB.animales.find(x=>x.id===id);if(t==='parto'){a.fechaUltimoParto=fd;a.estadoReproductivo='parida';a.diasGestacion=0;}if(t==='insem'){a.fechaUltimaInseminacion=fd;a.estadoReproductivo='gestando';}if(t==='secado'){a.estadoReproductivo='seca';}save();document.querySelector('.modal-overlay').remove();recalcularTodo(id);showToast('✅ Evento registrado');}
function showModalGestionAlimentos(){showModal(`<div style="font-weight:800;margin-bottom:14px;color:var(--accent-text)"><i class="fa-solid fa-plus"></i> NUEVO ALIMENTO</div><div class="flex-col gap8"><input id="acNombre" type="text" placeholder="Nombre del insumo"><div class="grid"><select id="acIcono"><option value="fa-wheat-awn">🌾 Grano</option><option value="fa-seedling">🌱 Forraje</option><option value="fa-cubes">🧊 Suplemento</option></select><select id="acUnidad"><option value="kg">Kilogramos</option><option value="g">Gramos</option></select></div><div class="grid"><input id="acDosis" type="number" step="0.001" placeholder="Dosis por kg de PV"><input id="acPrecioTotal" type="number" placeholder="Precio Total ($)"></div><div class="grid"><input id="acCantidadTotal" type="number" step="0.1" placeholder="Cantidad Total"><input id="acPrecioUnitario" type="text" readonly placeholder="Precio unitario auto..." style="background:rgba(255,255,255,.03);color:var(--accent-text)"></div><button class="btn btn-green" onclick="guardarAlimentoCustom()"><i class="fa-solid fa-check"></i> GUARDAR</button></div>`);}
function guardarAlimentoCustom(){const n=document.getElementById('acNombre').value.trim(),d=parseFloat(document.getElementById('acDosis').value),pt=parseFloat(document.getElementById('acPrecioTotal').value),ct=parseFloat(document.getElementById('acCantidadTotal').value);if(!n||isNaN(d)||isNaN(pt)||isNaN(ct))return showToast('⚠️ Completa todos los campos');const id='ac_'+Date.now();DB.alimentosCustom.push({id,nombre:n,icono:document.getElementById('acIcono').value,unidad:document.getElementById('acUnidad').value,dosisPorKg:d,precioUnitario:pt/ct,stock:ct});DB.precios[id]=pt/ct;DB.stock[id]=ct;save();document.querySelector('.modal-overlay').remove();showToast('✅ Insumo agregado');renderInsumos();}
function deleteAlimentoCustom(id){if(!confirm('¿Eliminar este insumo?'))return;DB.alimentosCustom=DB.alimentosCustom.filter(a=>a.id!==id);delete DB.precios[id];delete DB.stock[id];save();renderInsumos();}
function showModalGestionSanidad(){showModal(`<div style="font-weight:800;margin-bottom:14px;color:var(--accent-text)"><i class="fa-solid fa-plus"></i> NUEVO PRODUCTO</div><div class="flex-col gap8"><input id="scNombre" type="text" placeholder="Nombre del producto"><div class="grid"><select id="scIcono"><option value="fa-syringe">💉 Inyectable</option><option value="fa-pills">💊 Oral</option></select><input id="scColor" type="color" value="#a78bfa" style="width:100%;height:40px"></div><input id="scDosis" type="number" step="0.01" placeholder="Dosis (ml/kg)"><div class="grid"><input id="scEfecto" type="number" placeholder="Días de efecto"><input id="scRetiro" type="number" placeholder="Días de retiro"></div><div class="grid"><input id="scPrecioTotal" type="number" placeholder="Precio Total ($)"><input id="scMlTotal" type="number" placeholder="Mililitros Totales"></div><button class="btn btn-green" onclick="guardarSanidadCustom()"><i class="fa-solid fa-check"></i> GUARDAR</button></div>`);}
function guardarSanidadCustom(){const n=document.getElementById('scNombre').value.trim(),d=parseFloat(document.getElementById('scDosis').value),ef=parseInt(document.getElementById('scEfecto').value)||0,ret=parseInt(document.getElementById('scRetiro').value)||0,pt=parseFloat(document.getElementById('scPrecioTotal').value),ml=parseFloat(document.getElementById('scMlTotal').value);if(!n||isNaN(d)||isNaN(pt)||isNaN(ml))return showToast('⚠️ Completa todos los campos');const id='sc_'+Date.now();DB.sanidadCustom.push({id,nombre:n,icono:document.getElementById('scIcono').value,color:document.getElementById('scColor').value,dosisPorKg:d,diasEfecto:ef,retiro:ret,precioML:pt/ml,stockML:ml});DB.preciosSanidad[id]=pt/ml;DB.stockSanidad[id]=ml;save();document.querySelector('.modal-overlay').remove();showToast('✅ Producto agregado');renderInsumos();}
function deleteSanidadCustom(id){if(!confirm('¿Eliminar este producto?'))return;DB.sanidadCustom=DB.sanidadCustom.filter(a=>a.id!==id);delete DB.preciosSanidad[id];delete DB.stockSanidad[id];save();renderInsumos();}

// ==================== PWA & INIT ====================
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js',{scope:'./'}).then(r=>console.log('✅ SW registrada:',r.scope)).catch(e=>console.error('❌ Error SW:',e));});}
document.addEventListener('DOMContentLoaded',()=>{goPage('inicio');actualizarTransiciones();document.addEventListener('visibilitychange',()=>{if(document.hidden)save();});window.addEventListener('beforeunload',()=>{save();});});
</script>
